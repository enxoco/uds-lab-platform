base_path: "."

components:
  terraform:
    base_path: "components/terraform"
    command: tofu
    apply_auto_approve: false
    deploy_run_init: true
    init_run_reconfigure: true
    auto_generate_backend_file: false

stacks:
  base_path: "stacks"
  included_paths:
    - "**/*"
  excluded_paths:
    - "catalog/**/*"
  name_pattern: "{stage}"

logs:
  file: "/dev/stderr"
  level: Info

commands:
  - name: deploy-coder
    description: "Deploy coder-server with interactive location + server-type picker"
    arguments:
      - name: stack
        description: "Atmos stack name (default: dev)"
    steps:
      - type: shell
        command: bash scripts/deploy-coder.sh {{ .Arguments.stack }}
