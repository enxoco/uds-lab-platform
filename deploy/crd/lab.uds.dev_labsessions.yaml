apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: labsessions.lab.uds.dev
spec:
  group: lab.uds.dev
  scope: Namespaced
  names:
    kind: LabSession
    listKind: LabSessionList
    plural: labsessions
    singular: labsession
    shortNames:
      - ls
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Scenario
          type: string
          jsonPath: .spec.scenarioID
        - name: Expires
          type: string
          jsonPath: .spec.expiresAt
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [sessionID, scenarioID, clientID, expiresAt]
              properties:
                sessionID:
                  type: string
                scenarioID:
                  type: string
                clientID:
                  type: string
                userEmail:
                  type: string
                size:
                  type: string
                  enum: [small, medium, large]
                browserEnabled:
                  type: boolean
                expiresAt:
                  type: string
                  format: date-time
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Provisioning, Running, Ready, Expired, Failed]
                serviceDNS:
                  type: string
                message:
                  type: string
                completedSteps:
                  type: array
                  items:
                    type: object
                    required: [step, completedAt]
                    properties:
                      step:
                        type: string
                      completedAt:
                        type: string
                        format: date-time
