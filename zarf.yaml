# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
apiVersion: zarf.dev/v1alpha1

kind: ZarfPackageConfig
metadata:
  name: uds-lab-platform
  description: Lab server and operator — CRD, Deployments, RBAC.  KubeVirt/CDI/UDS Core are in the bundle.
  version: 0.4.0

constants:
  - name: VM_IMAGE_TAG
    value: "###ZARF_PKG_TMPL_VM_IMAGE_TAG###"

variables:
  - name: DOMAIN
    description: Base domain (e.g. uds.dev) — used by the UDS Package CR for Istio expose
    default: uds.dev
  - name: PROVIDER
    description: Provider backend ("kubevirt" or "pod")
    default: kubevirt

components:
  - name: lab-crds
    required: true
    description: LabSession CRD and VM namespace
    manifests:
      - name: lab-crds
        files:
          - deploy/namespace.yaml
          - deploy/crd/lab.uds.dev_labsessions.yaml

  - name: lab-platform
    required: true
    description: Lab server and operator Deployments, RBAC, and supporting resources
    charts:
      - name: lab-platform
        localPath: chart
        version: 0.4.0
        namespace: lab-platform
        variables:
          - name: DOMAIN
            description: Base domain for Istio expose
            path: domain
          - name: PROVIDER
            description: Provider backend (kubevirt or pod)
            path: provider
    images:
      - ghcr.io/enxoco/uds-lab-platform:0.4.0

  - name: vm-image-server
    required: true
    description: Base and uds-core VM images exposed by cluster-local HTTP servers
    manifests:
      - name: vm-image-server
        namespace: uds-lab-vms
        files:
          - packages/vm-images/manifests/image-server.yaml
    images:
      - ghcr.io/enxoco/lab-vm-images/base:###ZARF_PKG_TMPL_VM_IMAGE_TAG###
      - ghcr.io/enxoco/lab-vm-images/uds-core:###ZARF_PKG_TMPL_VM_IMAGE_TAG###
    actions:
      onDeploy:
        after:
          - description: Wait for UDS intra-namespace network policy
            maxTotalSeconds: 300
            wait:
              cluster:
                kind: package
                name: lab-vm-images
                namespace: uds-lab-vms
                condition: ready
          - description: Wait for both VM image server Pods
            maxTotalSeconds: 1800
            wait:
              cluster:
                kind: pod
                name: app.kubernetes.io/part-of=lab-vm-images
                namespace: uds-lab-vms
                condition: ready

  - name: golden-pvcs
    required: true
    description: Import golden VM disks from the cluster-local image servers
    manifests:
      - name: golden-pvcs
        namespace: uds-lab-vms
        files:
          - packages/vm-images/manifests/golden-pvcs.yaml
    actions:
      onDeploy:
        after:
          - description: Wait for the base golden image import
            maxTotalSeconds: 3600
            wait:
              cluster:
                kind: datavolume
                name: golden-base
                namespace: uds-lab-vms
                condition: ready
          - description: Wait for the UDS Core golden image import
            maxTotalSeconds: 3600
            wait:
              cluster:
                kind: datavolume
                name: golden-uds-core
                namespace: uds-lab-vms
                condition: ready
          - description: Scale bootstrap image servers to zero
            cmd: ./zarf tools kubectl scale deployment/vm-image-base deployment/vm-image-uds-core --replicas=0 --namespace=uds-lab-vms
