# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
apiVersion: zarf.dev/v1alpha1

kind: ZarfPackageConfig
metadata:
  name: uds-lab-platform
  description: UDS Lab Platform — interactive ISV packaging labs
  version: 0.1.0

variables:
  - name: IMAGE
    description: Lab platform container image
    default: ghcr.io/enxoco/uds-lab-platform:dev-local
  - name: DOMAIN
    description: Base domain for lab platform (e.g. example.com)
    default: uds.dev

components:
  - name: lab-crds
    required: true
    description: LabSession CRD — must deploy before the operator starts
    manifests:
      - name: lab-crds
        files:
          - deploy/namespace.yaml
          - deploy/crd/lab.uds.dev_labsessions.yaml

  - name: lab-platform
    required: true
    charts:
      - name: lab-platform
        localPath: chart
        version: 0.1.0
        namespace: lab-platform
        variables:
          - name: DOMAIN
            description: Base domain for lab platform
            path: domain
          - name: IMAGE
            description: Lab platform container image
            path: image
    images:
      - ghcr.io/enxoco/uds-lab-platform:dev-local
