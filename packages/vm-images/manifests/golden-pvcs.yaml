---
# CDI imports over stable cluster-local HTTP services. The backing server Pods
# use normal container image references, which Zarf rewrites at admission time.
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: golden-base
  namespace: uds-lab-vms
  labels:
    lab.uds.dev/golden-pvc: "true"
    lab.uds.dev/tier: base
spec:
  source:
    http:
      url: "http://vm-image-base.uds-lab-vms.svc.cluster.local:8080/lab-base.qcow2"
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 20Gi
---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: golden-uds-core
  namespace: uds-lab-vms
  labels:
    lab.uds.dev/golden-pvc: "true"
    lab.uds.dev/tier: uds-core
spec:
  source:
    http:
      url: "http://vm-image-uds-core.uds-lab-vms.svc.cluster.local:8080/lab-playground-uds-core.qcow2"
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 80Gi
