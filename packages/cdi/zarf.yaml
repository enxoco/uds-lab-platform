kind: ZarfPackageConfig
metadata:
  name: cdi
  description: Containerized Data Importer (CDI) for KubeVirt DataVolume support
  version: v1.64.0

components:
  - name: cdi-operator
    required: true
    description: CDI operator and CRDs
    manifests:
      - name: cdi-operator
        files:
          - https://github.com/kubevirt/containerized-data-importer/releases/download/v1.64.0/cdi-operator.yaml
    images:
      - quay.io/kubevirt/cdi-operator:v1.64.0
      - quay.io/kubevirt/cdi-apiserver:v1.64.0
      - quay.io/kubevirt/cdi-controller:v1.64.0
      - quay.io/kubevirt/cdi-uploadproxy:v1.64.0
      - quay.io/kubevirt/cdi-importer:v1.64.0
      - quay.io/kubevirt/cdi-cloner:v1.64.0
      - quay.io/kubevirt/cdi-uploadserver:v1.64.0

  - name: cdi-cr
    required: true
    description: CDI custom resource — activates the operator
    manifests:
      - name: cdi-cr
        files:
          - manifests/cdi-cr.yaml

  - name: uds-policies
    required: true
    description: UDS exemptions so Pepr allows privileged CDI pods
    manifests:
      - name: cdi-exemption
        files:
          - manifests/uds-exemption.yaml
