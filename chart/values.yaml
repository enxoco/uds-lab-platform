domain: uds.dev
image: ghcr.io/enxoco/uds-lab-platform:latest
vmNamespace: uds-lab-vms
sessionTTLMinutes: 60

# Provider backend: "kubevirt" (production) or "pod" (dev / no nested-virt).
# KubeVirt-specific RBAC and the golden-PVC config are only rendered when
# provider is "kubevirt".
provider: kubevirt

# KubeVirt-only: golden PVC names that CDI clones per session.
# Ignored when provider != "kubevirt".
# These names match what create-golden-pvc.sh produces.
goldenPVCs:
  base: golden-base
  tools: golden-tools
  uds-core: golden-uds-core
goldenPVCNamespace: ""   # defaults to vmNamespace
goldenPVCDiskSize: "80Gi"
