apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: uds-lab-platform
  namespace: {{ .Release.Namespace }}

spec:
  sso:
    # enableAuthserviceSelector routes ALL traffic for the selected pods through
    # Keycloak SSO via authservice.  There is no per-path bypass in the Package
    # spec — the Expose interface has no auth exclusion field (confirmed from
    # UDS Core TypeScript CRD).
    #
    # The self-service demo mode requires /demo and /api/demo-sessions to be
    # reachable without SSO.  After every deploy (or Package CR reconciliation),
    # run scripts/patch-demo-routes.sh to add notPaths to the Istio
    # AuthorizationPolicies that Pepr generates for this client:
    #
    #   kubectl apply: scripts/patch-demo-routes.sh --wait
    #
    # This is a cluster-level operation that must be performed by a cluster
    # admin until UDS Core adds per-path authservice bypass to the Package spec.
    - clientId: uds-lab-platform
      name: UDS Lab Platform
      redirectUris:
        - "https://lab.{{ .Values.domain }}/login"
      enableAuthserviceSelector:
        app: lab-platform
      protocolMappers:
        - name: groups
          protocol: openid-connect
          protocolMapper: oidc-group-membership-mapper
          consentRequired: false
          config:
            full.path: "true"
            id.token.claim: "true"
            access.token.claim: "true"
            userinfo.token.claim: "true"
            claim.name: groups
  network:
    allow:
      - direction: Egress
        remoteNamespace: {{ .Values.vmNamespace }}
        description: Proxy to lab VM services
      - direction: Egress
        remoteGenerated: KubeAPI
        description: Kubernetes API server
    expose:
      - service: lab-platform
        selector:
          app: lab-platform
        host: lab
        gateway: tenant
        port: 8080
