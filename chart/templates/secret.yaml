{{- /*
  Auto-generate the HMAC signing key for demo tokens on first install.
  On subsequent upgrades, lookup preserves the existing key so outstanding
  demo tokens remain valid. To rotate: delete the Secret and re-deploy.
*/}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "lab-demo-token-key" }}
{{- $hmacKey := "" }}
{{- if $existingSecret }}
  {{- $hmacKey = index $existingSecret.data "DEMO_TOKEN_HMAC_KEY" }}
{{- else }}
  {{- $hmacKey = randAlphaNum 64 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: lab-demo-token-key
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  DEMO_TOKEN_HMAC_KEY: {{ $hmacKey }}
