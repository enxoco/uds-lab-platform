apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-platform
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-platform
  template:
    metadata:
      labels:
        app: lab-platform
    spec:
      containers:
        - name: lab-platform
          image: {{ .Values.image }}
          ports:
            - containerPort: 8080
          env:
            - name: HCLOUD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lab-platform-hcloud
                  key: HCLOUD_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
