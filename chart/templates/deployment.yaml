apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-platform
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab-platform-server
  namespace: {{ .Values.vmNamespace }}
rules:
  - apiGroups: ["lab.uds.dev"]
    resources: ["labsessions"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab-platform-server
  namespace: {{ .Values.vmNamespace }}
subjects:
  - kind: ServiceAccount
    name: lab-platform
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: lab-platform-server
  apiGroup: rbac.authorization.k8s.io
---
# Demo token store: server reads/writes this ConfigMap in its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab-platform-demo-tokens
  namespace: {{ .Release.Namespace }}
rules:
  # create has no resource name in the URL so resourceNames can't filter it
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["lab-demo-tokens"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab-platform-demo-tokens
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: lab-platform
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: lab-platform-demo-tokens
  apiGroup: rbac.authorization.k8s.io
---
# Operator: cluster-wide watch for all managed resource types.
# controller-runtime initializes cluster-scoped informers for all scheme types it accesses.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lab-operator-watch
rules:
  - apiGroups: ["lab.uds.dev"]
    resources: ["labsessions", "labsessions/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachineinstances"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lab-operator-watch
subjects:
  - kind: ServiceAccount
    name: lab-platform
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: lab-operator-watch
  apiGroup: rbac.authorization.k8s.io
---
# Operator: write access to VM resources in vmNamespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab-operator
  namespace: {{ .Values.vmNamespace }}
rules:
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachineinstances"]
    verbs: ["create", "get", "list", "watch", "update", "delete"]
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes"]
    verbs: ["create", "update", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "watch", "update", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab-operator
  namespace: {{ .Values.vmNamespace }}
subjects:
  - kind: ServiceAccount
    name: lab-platform
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: lab-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-platform
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-platform
  template:
    metadata:
      labels:
        app: lab-platform
    spec:
      serviceAccountName: lab-platform
      containers:
        - name: lab-platform
          image: {{ .Values.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: VM_NAMESPACE
              value: {{ .Values.vmNamespace | quote }}
            - name: SESSION_TTL_MINUTES
              value: {{ .Values.sessionTTLMinutes | default 60 | quote }}
            - name: SERVER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DEMO_TOKEN_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: lab-demo-token-key
                  key: DEMO_TOKEN_HMAC_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-operator
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-operator
  template:
    metadata:
      labels:
        app: lab-operator
    spec:
      serviceAccountName: lab-platform
      containers:
        - name: lab-operator
          image: {{ .Values.image }}
          imagePullPolicy: Always
          command: ["/lab-operator"]
          env:
            - name: OPERATOR_CONFIG
              value: /etc/lab-operator/config.yaml
            - name: VM_NAMESPACE
              value: {{ .Values.vmNamespace | quote }}
            - name: SERVER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: lab-operator-config
              mountPath: /etc/lab-operator
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: lab-operator-config
          configMap:
            name: lab-operator-config
