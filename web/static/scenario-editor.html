<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scenario Editor</title>
  <link rel="stylesheet" href="/ide-assets/main.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --text-muted: #8b949e;
      --accent: #58a6ff; --success: #3fb950; --danger: #f85149;
      --warn: #d29922; --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    /* ── Top bar ── */
    .ide-bar {
      display: flex; align-items: center; gap: 8px;
      height: 40px; padding: 0 12px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .ide-bar .back { font-size: 12px; color: var(--text-muted); text-decoration: none; }
    .ide-bar .back:hover { color: var(--accent); }
    .ide-bar .scenario-id { font-family: var(--mono); font-size: 12px; color: var(--accent); }
    .ide-bar .sep { color: var(--border); }
    .ide-bar .filename { font-family: var(--mono); font-size: 12px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ide-bar .filename.dirty { color: var(--text); }
    .ide-bar .filename.dirty::after { content: ' ●'; color: var(--accent); }
    .save-status { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .btn-save { padding: 3px 10px; font-size: 12px; border-radius: 4px; background: var(--accent); color: #000; border: none; cursor: pointer; font-weight: 600; }
    .btn-save:hover { opacity: .85; }
    .btn-save:disabled { opacity: .4; cursor: default; }

    /* ── Layout ── */
    .ide-body { display: flex; height: calc(100% - 40px); overflow: hidden; }

    /* ── File tree ── */
    .tree-panel {
      width: 220px; min-width: 160px; max-width: 320px;
      background: var(--surface); border-right: 1px solid var(--border);
      overflow-y: auto; flex-shrink: 0; user-select: none;
    }
    .tree-panel::-webkit-scrollbar { width: 4px; }
    .tree-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tree-header { padding: 8px 12px 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
    .tree-item { display: flex; align-items: center; gap: 4px; padding: 3px 8px; cursor: pointer; white-space: nowrap; border-left: 2px solid transparent; }
    .tree-item:hover { background: rgba(255,255,255,.04); }
    .tree-item.active { background: rgba(88,166,255,.1); border-left-color: var(--accent); color: var(--accent); }
    .tree-item .icon { font-size: 11px; flex-shrink: 0; width: 18px; text-align: center; }
    .tree-item .name { font-family: var(--mono); font-size: 12px; overflow: hidden; text-overflow: ellipsis; }
    .tree-item .dir-arrow { font-size: 9px; flex-shrink: 0; width: 10px; color: var(--text-muted); }
    .fbadge { display: inline-block; font-size: 8px; font-weight: 700; font-family: var(--mono); padding: 1px 3px; border-radius: 2px; letter-spacing: .02em; line-height: 1.4; flex-shrink: 0; }
    .fb-go   { background: rgba( 0,173,216,.2); color: #00add8; }
    .fb-js   { background: rgba(247,223, 30,.2); color: #f7df1e; }
    .fb-ts   { background: rgba( 49,120,198,.2); color: #3178c6; }
    .fb-py   { background: rgba( 55,118,171,.2); color: #3776ab; }
    .fb-sh   { background: rgba( 63,185, 80,.2); color: #3fb950; }
    .fb-yaml { background: rgba(203, 36,136,.2); color: #cb2484; }
    .fb-json { background: rgba(247,148, 29,.2); color: #f7941d; }
    .fb-md   { background: rgba(255,255,255,.1); color: #aaa; }
    .fb-css  { background: rgba( 21,114,182,.2); color: #1572b6; }
    .fb-tf   { background: rgba(126, 57,174,.2); color: #7e39ae; }
    .fb-dir  { color: #dcb67a; }
    .fb-file { background: rgba(255,255,255,.07); color: var(--text-muted); }
    .tree-children { display: none; }
    .tree-children.open { display: block; }

    /* ── Editor + preview ── */
    .editor-wrap { flex: 1; display: flex; overflow: hidden; }
    #editor-container { flex: 1; overflow: hidden; }
    #preview-pane {
      display: none; width: 380px; min-width: 280px; flex-shrink: 0;
      border-left: 1px solid var(--border); overflow-y: auto;
      background: var(--bg); padding: 20px 24px;
    }
    #preview-pane::-webkit-scrollbar { width: 4px; }
    #preview-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    #preview-content h1, #preview-content h2, #preview-content h3 { margin: .8em 0 .4em; font-weight: 600; }
    #preview-content h1 { font-size: 18px; }
    #preview-content h2 { font-size: 15px; }
    #preview-content h3 { font-size: 13px; }
    #preview-content code { font-family: var(--mono); font-size: 12px; background: rgba(255,255,255,.07); padding: 1px 4px; border-radius: 3px; }
    #preview-content pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0; }
    #preview-content pre code { background: none; padding: 0; }
    #preview-content li { margin-left: 18px; line-height: 1.6; }
    #preview-content strong { color: var(--text); }
    #preview-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 12px; }

    /* ── Empty state ── */
    .no-file { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 13px; flex-direction: column; gap: 8px; flex: 1; }
    .no-file span { font-size: 32px; }
  </style>
</head>
<body>
  <div class="ide-bar">
    <a class="back" href="/admin">← Admin</a>
    <span class="sep">|</span>
    <span class="scenario-id" id="scenario-id-label"></span>
    <span class="sep">/</span>
    <div class="filename" id="filename">No file open</div>
    <span class="save-status" id="save-status"></span>
    <button class="btn-save" id="btn-save" onclick="saveFile()" disabled>Save</button>
    <span style="font-size:11px;color:var(--text-muted)">Ctrl+S</span>
  </div>
  <div class="ide-body">
    <div class="tree-panel">
      <div class="tree-header">Files</div>
      <div id="tree"></div>
    </div>
    <div class="editor-wrap">
      <div id="editor-container"></div>
      <div class="no-file" id="no-file"><span>✏️</span>Select a file to edit</div>
      <div id="preview-pane">
        <div id="preview-label">Preview</div>
        <div id="preview-content"></div>
      </div>
    </div>
  </div>
  <script>
    // Set scenario label from URL
    document.getElementById('scenario-id-label').textContent =
      location.pathname.split('/')[3] || '';
  </script>
  <script type="module" src="/ide-assets/scenario-editor.js"></script>
</body>
</html>
