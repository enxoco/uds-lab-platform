<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDE</title>
  <link rel="stylesheet" href="/ide-assets/main.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --text-muted: #8b949e;
      --accent: #58a6ff; --success: #3fb950; --danger: #f85149;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    /* ── Top bar ── */
    .ide-bar {
      display: flex; align-items: center; gap: 8px;
      height: 36px; padding: 0 12px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ide-bar .filename { font-family: var(--mono); font-size: 12px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ide-bar .filename.dirty { color: var(--text); }
    .ide-bar .filename.dirty::after { content: ' ●'; color: var(--accent); }
    .btn-save {
      padding: 3px 10px; font-size: 12px; border-radius: 4px;
      background: var(--accent); color: #000; border: none; cursor: pointer; font-weight: 600;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: default; }
    .save-status { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    /* ── Layout ── */
    .ide-body { display: flex; height: calc(100% - 36px); overflow: hidden; }

    /* ── File tree ── */
    .tree-panel {
      width: 220px; min-width: 160px; max-width: 360px;
      background: var(--surface); border-right: 1px solid var(--border);
      overflow-y: auto; overflow-x: hidden; flex-shrink: 0;
      user-select: none;
    }
    .tree-panel::-webkit-scrollbar { width: 4px; }
    .tree-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tree-header { padding: 8px 12px 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
    .tree-path-bar { display: flex; gap: 4px; padding: 4px 8px 6px; border-bottom: 1px solid var(--border); }
    .tree-path-bar input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 3px 6px; min-width: 0; }
    .tree-path-bar input:focus { outline: none; border-color: var(--accent); }
    .tree-path-bar button { background: var(--border); border: none; color: var(--text); border-radius: 4px; padding: 3px 7px; cursor: pointer; font-size: 12px; }
    .tree-path-bar button:hover { background: var(--accent); color: #000; }
    .tree-item {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px; cursor: pointer; white-space: nowrap;
      border-left: 2px solid transparent;
    }
    .tree-item:hover { background: rgba(255,255,255,.04); }
    .tree-item.active { background: rgba(88,166,255,.1); border-left-color: var(--accent); color: var(--accent); }
    .tree-item .icon { font-size: 11px; flex-shrink: 0; width: 18px; text-align: center; }
    .tree-item .name { font-family: var(--mono); font-size: 12px; overflow: hidden; text-overflow: ellipsis; }
    .tree-item .dir-arrow { font-size: 9px; flex-shrink: 0; width: 10px; color: var(--text-muted); }
    .fbadge {
      display: inline-block; font-size: 8px; font-weight: 700; font-family: var(--mono);
      padding: 1px 3px; border-radius: 2px; letter-spacing: .02em; line-height: 1.4;
      flex-shrink: 0;
    }
    .fb-go   { background: rgba( 0,173,216,.2); color: #00add8; }
    .fb-js   { background: rgba(247,223, 30,.2); color: #f7df1e; }
    .fb-ts   { background: rgba( 49,120,198,.2); color: #3178c6; }
    .fb-py   { background: rgba( 55,118,171,.2); color: #3776ab; }
    .fb-sh   { background: rgba( 63,185, 80,.2); color: #3fb950; }
    .fb-yaml { background: rgba(203, 36,136,.2); color: #cb2484; }
    .fb-json { background: rgba(247,148, 29,.2); color: #f7941d; }
    .fb-md   { background: rgba(255,255,255,.1); color: #aaa; }
    .fb-html { background: rgba(228, 77, 38,.2); color: #e44d26; }
    .fb-css  { background: rgba( 21,114,182,.2); color: #1572b6; }
    .fb-tf   { background: rgba(126, 57,174,.2); color: #7e39ae; }
    .fb-rs   { background: rgba(222,165,132,.2); color: #dea584; }
    .fb-dir  { color: #dcb67a; }
    .fb-file { background: rgba(255,255,255,.07); color: var(--text-muted); }
    .tree-children { display: none; }
    .tree-children.open { display: block; }

    /* ── Editor ── */
    .editor-wrap { flex: 1; overflow: hidden; }
    #editor-container { width: 100%; height: 100%; }

    /* ── Empty state ── */
    .no-file { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 13px; flex-direction: column; gap: 8px; }
    .no-file span { font-size: 32px; }
  </style>
</head>
<body>
  <div class="ide-bar">
    <div class="filename" id="filename">No file open</div>
    <span class="save-status" id="save-status"></span>
    <button class="btn-save" id="btn-save" onclick="saveFile()" disabled>Save</button>
    <span style="font-size:11px;color:var(--text-muted)">Ctrl+S</span>
  </div>
  <div class="ide-body">
    <div class="tree-panel">
      <div class="tree-header">Files</div>
      <div class="tree-path-bar">
        <input id="tree-path-input" type="text" value="/root" spellcheck="false"
               onkeydown="if(event.key==='Enter') navigateTo(this.value)">
        <button onclick="navigateTo(document.getElementById('tree-path-input').value)">→</button>
      </div>
      <div id="tree"></div>
    </div>
    <div class="editor-wrap">
      <div id="editor-container"></div>
      <div class="no-file" id="no-file"><span>⌨</span>Select a file to edit</div>
    </div>
  </div>

  <script type="module" src="/ide-assets/main.js"></script>
</body>
</html>
