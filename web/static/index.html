<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UDS Interactive Labs</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav>
    <span class="logo">UDS Labs</span>
  </nav>

  <div id="resume-banner" style="display:none;background:rgba(88,166,255,0.08);border-bottom:1px solid rgba(88,166,255,0.2);padding:12px 24px;display:none;align-items:center;gap:12px;font-size:13px;">
    <span style="color:var(--text-muted)">You have an active lab session.</span>
    <a id="resume-link" href="#" style="color:var(--accent);font-weight:600;">Resume Lab →</a>
    <button onclick="dismissResume()" style="margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;line-height:1;">×</button>
  </div>

  <div class="catalog">
    <h1>Interactive Labs</h1>
    <p class="subtitle">Hands-on UDS and Zarf exercises in a live browser environment — no installs required.</p>
    <div class="scenario-grid" id="grid">
      <div class="loading-text">Loading scenarios…</div>
    </div>
  </div>

  <script>
    function fmtTTL(minutes) {
      if (minutes < 60) return `${minutes} min`;
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return m === 0 ? `${h}h` : `${h}h ${m}m`;
    }

    async function load() {
      const [scenariosRes, configRes] = await Promise.all([
        fetch('/api/scenarios'),
        fetch('/api/config'),
      ]);
      const scenarios = await scenariosRes.json();
      const config = await configRes.json();
      const sessionTTL = config.session_ttl_minutes;
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (!scenarios.length) {
        grid.innerHTML = '<div class="loading-text">No scenarios available.</div>';
        return;
      }

      scenarios.forEach(s => {
        const card = document.createElement('div');
        card.className = 'scenario-card' + (s.playground ? ' playground-card' : '');
        card.innerHTML = `
          <div class="card-header">
            <h2>${esc(s.title || s.id)}</h2>
            ${s.playground ? '<span class="tag tag-playground">⬡ Playground</span>' : ''}
          </div>
          <p>${esc(s.description || '')}</p>
          <div class="scenario-meta">
            ${s.duration ? `<span>⏱ ~${s.duration} min</span>` : ''}
            <span title="Session time limit">⏳ ${fmtTTL(sessionTTL)}</span>
            ${s.difficulty ? `<span class="tag">${esc(s.difficulty)}</span>` : ''}
          </div>
        `;
        card.addEventListener('click', (e) => startLab(s.id, e.currentTarget));
        grid.appendChild(card);
      });
    }

    let activeSession = null;

    async function checkActiveSession() {
      try {
        const res = await fetch('/api/sessions/me');
        if (res.ok) {
          activeSession = await res.json();
          const banner = document.getElementById('resume-banner');
          document.getElementById('resume-link').href =
            `/lab.html?session=${activeSession.id}&scenario=${activeSession.scenario}`;
          banner.style.display = 'flex';
        }
      } catch {}
    }

    function dismissResume() {
      document.getElementById('resume-banner').style.display = 'none';
    }

    async function startLab(scenarioId, cardEl) {
      const h2 = cardEl.querySelector('h2');
      const orig = h2.textContent;
      h2.textContent = 'Starting…';

      try {
        const res = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scenario: scenarioId }),
        });
        if (res.status === 409 && activeSession) {
          window.location.href =
            `/lab.html?session=${activeSession.id}&scenario=${activeSession.scenario}`;
          return;
        }
        if (!res.ok) throw new Error(await res.text());
        const session = await res.json();
        window.location.href = `/lab.html?session=${session.id}&scenario=${scenarioId}`;
      } catch (e) {
        h2.textContent = orig;
        alert('Failed to start lab: ' + e.message);
      }
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    load();
    checkActiveSession();
  </script>
</body>
</html>
