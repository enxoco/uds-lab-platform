<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UDS Labs — Workshop Access</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .login-wrap {
      max-width: 420px;
      margin: 100px auto;
      padding: 0 24px;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px;
    }
    .login-box h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .login-box .sub {
      color: var(--text-muted);
      margin-bottom: 28px;
      font-size: 13px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-align: center;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: var(--accent-hover); }
    .error-msg {
      display: none;
      background: rgba(248,81,73,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <nav>
    <span class="logo">UDS Labs</span>
  </nav>
  <div class="login-wrap">
    <div class="login-box">
      <h1>Workshop Access</h1>
      <p class="sub">Enter the code provided by your instructor, then sign in with GitHub.</p>
      <div id="error" class="error-msg">Incorrect workshop code — try again.</div>
      <form method="POST" action="/login">
        <div class="form-group">
          <label for="code">Workshop Code</label>
          <input type="text" id="code" name="code" placeholder="e.g. SCS-HERO-2026"
                 autocomplete="off" autocapitalize="characters" spellcheck="false" autofocus required>
        </div>
        <button type="submit" class="btn btn-primary">Continue with GitHub →</button>
      </form>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error') === 'invalid') {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
