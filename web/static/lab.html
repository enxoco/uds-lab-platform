<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UDS Labs</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="lab-locked">
  <nav>
    <a class="logo" href="/">UDS Labs</a>
    <span id="scenario-title" style="color:var(--text-muted);font-size:13px;"></span>
    <span style="flex:1"></span>
    <span class="timer" id="timer">--:--</span>
    <button class="btn btn-danger" id="end-btn" onclick="confirmEnd()">End Lab</button>
  </nav>

  <!-- Teardown overlay -->
  <div id="teardown-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <div class="spinner"></div>
    <div style="color:var(--text);font-size:14px;">Tearing down lab environment…</div>
  </div>

  <!-- Confirm dialog -->
  <div id="confirm-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:360px;width:90%;display:flex;flex-direction:column;gap:16px;">
      <div style="font-weight:600;font-size:16px;">End this lab?</div>
      <div style="color:var(--text-muted);font-size:13px;">The VM will be destroyed and your progress will be lost.</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="document.getElementById('confirm-overlay').style.display='none'">Cancel</button>
        <button class="btn btn-danger" onclick="endLab()">End Lab</button>
      </div>
    </div>
  </div>

  <div class="lab-layout">
    <!-- Instructions -->
    <div class="instructions-panel">
      <div class="instructions-header">
        <span class="title" id="step-title">Loading…</span>
        <div class="step-nav">
          <span id="step-counter"></span>
        </div>
      </div>
      <div class="instructions-body" id="instructions-body"></div>
      <div class="services-section" id="services-section" style="display:none;">
        <div class="services-header" onclick="toggleServices()">
          <span>⬡ Services</span>
          <span id="services-chevron">▸</span>
        </div>
        <div class="services-list" id="services-list"></div>
      </div>
      <div class="instructions-footer">
        <button class="btn btn-ghost" id="prev-btn" onclick="prevStep()">← Prev</button>
        <div class="step-dots" id="step-dots"></div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-check" id="check-btn" onclick="checkStep()" style="display:none;">Check</button>
          <button class="btn btn-primary" id="next-btn" onclick="nextStep()">Next →</button>
        </div>
      </div>
    </div>

    <!-- Terminal -->
    <div class="terminal-panel">
      <div class="terminal-header">
        <div class="tab-bar" id="tab-bar"></div>
        <button class="tab-add" id="tab-add" onclick="addTab()" title="New terminal" disabled>+</button>
        <span style="flex:1"></span>
        <div id="service-chips" style="display:flex;align-items:stretch;gap:0;"></div>
        <button class="btn-browser" id="browser-btn" onclick="openBrowser()" style="display:none;" title="Open browser preview">⬡ Browser</button>
        <span style="font-size:12px;color:var(--text-muted);" id="terminal-status">Provisioning VM…</span>
      </div>
      <div class="terminal-frame" id="terminal-frame">
        <div class="loading-overlay" id="loading">
          <div class="spinner"></div>
          <div class="loading-text" id="loading-text">Provisioning lab environment…</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params   = new URLSearchParams(location.search);
    const SESSION  = params.get('session');
    const SCENARIO = params.get('scenario');
    const MAX_TABS = 4;

    let steps = [];
    let currentStep = 0;
    let labReady = false;
    let stepVerified = {};
    let expiresAt = null;
    let timerInterval = null;
    let pollInterval = null;
    let tabs = [];       // [{id, iframe, btn}]
    let activeTab = null;
    let vncWindow = null;
    let servicesPollInterval = null;
    let servicesOpen = true;

    // ── Init ────────────────────────────────────────────────────────────────
    async function init() {
      if (!SESSION || !SCENARIO) { location.href = '/'; return; }
      const sc = await fetch(`/api/scenarios/${SCENARIO}`).then(r => r.json());
      document.getElementById('scenario-title').textContent = sc.title || SCENARIO;
      steps = sc.steps || [];
      renderDots();
      showStep(0);
      pollSession();
    }

    // ── Tabs ────────────────────────────────────────────────────────────────
    function addTab() {
      if (tabs.length >= MAX_TABS) return;
      const id = tabs.length + 1;
      // Tab 1 = setup-aware entry; subsequent tabs = direct root shell
      const src = id === 1 ? `/t/${SESSION}/` : `/t/${SESSION}/shell/`;

      const iframe = document.createElement('iframe');
      iframe.src = src;
      iframe.title = id === 1 ? 'Terminal 1 (setup)' : `Terminal ${id}`;
      iframe.style.cssText = 'width:100%;height:100%;border:none;display:none;';
      document.getElementById('terminal-frame').appendChild(iframe);

      const btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.innerHTML = `Terminal ${id} <span class="tab-close" onclick="closeTab(event,${id - 1})">×</span>`;
      btn.onclick = (e) => { if (!e.target.classList.contains('tab-close')) switchTab(id - 1); };
      document.getElementById('tab-bar').appendChild(btn);

      tabs.push({ id, iframe, btn });
      switchTab(tabs.length - 1);
      document.getElementById('tab-add').disabled = tabs.length >= MAX_TABS;
    }

    function switchTab(idx) {
      tabs.forEach((t, i) => {
        t.iframe.style.display = i === idx ? 'block' : 'none';
        t.btn.classList.toggle('active', i === idx);
      });
      activeTab = idx;
    }

    function closeTab(e, idx) {
      e.stopPropagation();
      if (tabs.length === 1) return; // keep at least one
      const { iframe, btn } = tabs[idx];
      iframe.remove();
      btn.remove();
      tabs.splice(idx, 1);
      // renumber labels
      tabs.forEach((t, i) => {
        t.btn.innerHTML = `Terminal ${i + 1} <span class="tab-close" onclick="closeTab(event,${i})">×</span>`;
        t.btn.onclick = (e) => { if (!e.target.classList.contains('tab-close')) switchTab(i); };
      });
      switchTab(Math.min(idx, tabs.length - 1));
      document.getElementById('tab-add').disabled = tabs.length >= MAX_TABS;
    }

    // ── Session polling ─────────────────────────────────────────────────────
    async function pollSession() {
      pollInterval = setInterval(async () => {
        const sess = await fetch(`/api/sessions/${SESSION}`).then(r => r.json());
        if (sess.error) { clearInterval(pollInterval); return; }

        if (!expiresAt) {
          expiresAt = new Date(sess.expires_at);
          startTimer();
        }

        if (sess.status === 'ready') {
          clearInterval(pollInterval);
          labReady = true;
          document.body.classList.remove('lab-locked');
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('terminal-status').textContent = 'Connected';
          document.getElementById('tab-add').disabled = false;
          if (sess.browser_enabled) {
            document.getElementById('browser-btn').style.display = 'inline-flex';
          }
          showStep(currentStep); // re-render to enable nav buttons
          addTab(); // open first tab
          if (sess.browser_enabled) startServicesPoll();
        } else {
          document.getElementById('loading-text').textContent =
            'Provisioning lab environment… (this takes ~60–90 seconds)';
        }
      }, 4000);
    }

    // ── Click-to-run: inject into tmux main session via VM injection server ─
    function bindCodeBlocks() {
      document.querySelectorAll('#instructions-body pre').forEach(pre => {
        pre.onclick = () => {
          if (!labReady) return;
          pre.classList.add('running');
          setTimeout(() => pre.classList.remove('running'), 600);
          // Always target Terminal 1 (Lab Terminal); switch to it so the user sees the injection.
          if (activeTab !== 0) switchTab(0);
          tabs[0].btn.classList.add('cmd-sent');
          setTimeout(() => tabs[0].btn.classList.remove('cmd-sent'), 800);
          const code = (pre.querySelector('code')?.textContent || pre.textContent).trimEnd();
          fetch(`/t/${SESSION}/cmd`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: code }),
          }).catch(() => {});
        };
      });
    }

    // ── VNC links: open *.uds.dev links in VM browser when browser_enabled ──
    function bindVNCLinks() {
      document.querySelectorAll('#instructions-body a').forEach(a => {
        try {
          const u = new URL(a.href);
          if (!u.hostname.endsWith('.uds.dev')) return;
        } catch { return; }
        a.title = '⬡ Opens in VM browser';
        a.classList.add('vnc-link');
        a.onclick = (e) => {
          e.preventDefault();
          if (!labReady) return;
          a.classList.add('vnc-link-opening');
          const delay = ensureVNCOpen();
          setTimeout(() => {
            a.classList.remove('vnc-link-opening');
            fetch(`/t/${SESSION}/navigate`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ url: a.href }),
            }).catch(() => {});
          }, delay);
        };
      });
    }

    // ── Timer ───────────────────────────────────────────────────────────────
    function timerTick() {
      const remaining = Math.max(0, expiresAt - Date.now());
      const totalSecs = Math.floor(remaining / 1000);
      const h = Math.floor(totalSecs / 3600);
      const m = Math.floor((totalSecs % 3600) / 60);
      const s = totalSecs % 60;
      const el = document.getElementById('timer');
      el.textContent = h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      el.className = 'timer' + (m < 5 && h === 0 ? ' danger' : (m < 15 && h === 0) ? ' warn' : '');
      if (remaining === 0) { clearInterval(timerInterval); endLab(); }
    }

    function startTimer() {
      timerTick();
      timerInterval = setInterval(timerTick, 1000);
    }

    // ── Steps ───────────────────────────────────────────────────────────────
    function showStep(n) {
      currentStep = Math.max(0, Math.min(n, steps.length - 1));
      const step = steps[currentStep];
      document.getElementById('step-title').textContent = step.title;
      document.getElementById('step-counter').textContent =
        `Step ${currentStep + 1} of ${steps.length}`;
      const body = document.getElementById('instructions-body');
      body.innerHTML = marked.parse(step.content || '');
      body.scrollTop = 0;

      const verified = !!stepVerified[currentStep];
      const checkBtn = document.getElementById('check-btn');
      const nextBtn  = document.getElementById('next-btn');

      document.getElementById('prev-btn').disabled = !labReady || currentStep === 0;

      if (step.has_verify) {
        checkBtn.style.display = 'inline-flex';
        checkBtn.disabled = !labReady || verified;
        checkBtn.className = 'btn ' + (verified ? 'btn-check-pass' : 'btn-check');
        checkBtn.textContent = verified ? '✓ Passed' : 'Check';
        nextBtn.disabled = !labReady || !verified;
      } else {
        checkBtn.style.display = 'none';
        nextBtn.disabled = !labReady;
      }

      nextBtn.textContent = currentStep === steps.length - 1 ? 'Finish' : 'Next →';
      updateDots();
      bindCodeBlocks();
      bindVNCLinks();
    }

    // ── Browser preview ─────────────────────────────────────────────────────
    function openBrowser() {
      if (!vncWindow || vncWindow.closed) {
        vncWindow = window.open(`/vnc/${SESSION}/vnc.html?autoconnect=true&resize=scale&path=vnc/${SESSION}/websockify`, '_blank');
      } else {
        vncWindow.focus();
      }
    }

    function ensureVNCOpen() {
      const needsOpen = !vncWindow || vncWindow.closed;
      if (needsOpen) openBrowser();
      return needsOpen ? 2000 : 0; // delay ms if just opened
    }

    // ── Services ────────────────────────────────────────────────────────────
    function startServicesPoll() {
      fetchServices();
      servicesPollInterval = setInterval(fetchServices, 10000);
    }

    async function fetchServices() {
      try {
        const services = await fetch(`/api/sessions/${SESSION}/services`).then(r => r.json());
        if (services && services.length > 0) {
          renderServices(services);
        }
      } catch {}
    }

    function renderServices(services) {
      // Instructions panel section
      const section = document.getElementById('services-section');
      const list = document.getElementById('services-list');
      list.innerHTML = '';
      services.forEach(svc => {
        const a = document.createElement('a');
        a.href = svc.url;
        a.textContent = svc.url;
        a.className = 'service-link vnc-link';
        a.onclick = (e) => {
          e.preventDefault();
          if (!labReady) return;
          const delay = ensureVNCOpen();
          setTimeout(() => {
            fetch(`/t/${SESSION}/navigate`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ url: svc.url }),
            }).catch(() => {});
          }, delay);
        };
        list.appendChild(a);
      });
      section.style.display = 'block';

      // Terminal header chips
      const chips = document.getElementById('service-chips');
      chips.innerHTML = '';
      services.forEach(svc => {
        const btn = document.createElement('button');
        btn.className = 'service-chip';
        btn.textContent = svc.url;
        btn.title = svc.label;
        btn.onclick = () => {
          if (!labReady) return;
          const delay = ensureVNCOpen();
          setTimeout(() => {
            fetch(`/t/${SESSION}/navigate`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ url: svc.url }),
            }).catch(() => {});
          }, delay);
        };
        chips.appendChild(btn);
      });
    }

    function toggleServices() {
      servicesOpen = !servicesOpen;
      document.getElementById('services-list').style.display = servicesOpen ? 'flex' : 'none';
      document.getElementById('services-chevron').textContent = servicesOpen ? '▾' : '▸';
    }

    // ── Step verification ───────────────────────────────────────────────────
    async function checkStep() {
      const btn = document.getElementById('check-btn');
      btn.disabled = true;
      btn.textContent = 'Checking…';
      btn.className = 'btn btn-check';
      try {
        const res = await fetch(`/api/sessions/${SESSION}/verify/${currentStep + 1}`, { method: 'POST' });
        const data = await res.json();
        if (data.pass) {
          stepVerified[currentStep] = true;
          btn.textContent = '✓ Passed';
          btn.className = 'btn btn-check-pass';
          document.getElementById('next-btn').disabled = false;
        } else {
          btn.textContent = '✗ Not yet';
          btn.className = 'btn btn-check-fail';
          setTimeout(() => {
            btn.textContent = 'Check';
            btn.className = 'btn btn-check';
            btn.disabled = false;
          }, 2000);
        }
      } catch {
        btn.textContent = 'Check';
        btn.disabled = false;
      }
    }

    function prevStep() { showStep(currentStep - 1); }
    function nextStep() {
      if (currentStep === steps.length - 1) { confirmEnd(); return; }
      showStep(currentStep + 1);
    }

    function renderDots() {
      const container = document.getElementById('step-dots');
      container.innerHTML = '';
      steps.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'step-dot';
        dot.onclick = () => showStep(i);
        container.appendChild(dot);
      });
    }

    function updateDots() {
      document.querySelectorAll('.step-dot').forEach((dot, i) => {
        dot.className = 'step-dot' +
          (i === currentStep ? ' active' : i < currentStep ? ' done' : '');
      });
    }

    // ── End lab ─────────────────────────────────────────────────────────────
    function confirmEnd() {
      document.getElementById('confirm-overlay').style.display = 'flex';
    }

    async function endLab() {
      document.getElementById('confirm-overlay').style.display = 'none';
      document.getElementById('teardown-overlay').style.display = 'flex';
      clearInterval(timerInterval);
      clearInterval(pollInterval);
      clearInterval(servicesPollInterval);
      await fetch(`/api/sessions/${SESSION}`, { method: 'DELETE' }).catch(() => {});
      location.href = '/';
    }

    init();
  </script>
</body>
</html>
