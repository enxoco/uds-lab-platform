<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UDS Labs — Admin</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-wrap { max-width: 1100px; margin: 40px auto; padding: 0 24px; }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex; gap: 0; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 8px 20px; font-size: 13px; font-weight: 500;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Shared ── */
    .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .page-header h1 { font-size: 18px; font-weight: 600; }
    .admin-badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      background: rgba(248,81,73,.15); color: var(--danger); border: 1px solid rgba(248,81,73,.3);
    }
    .refresh { margin-left: auto; font-size: 12px; color: var(--text-muted); }
    table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    th, td { padding: 11px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { font-weight: 600; color: var(--text-muted); background: var(--bg); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
    tr:last-child td { border-bottom: none; }
    .gh { font-family: var(--mono); font-size: 13px; }
    .ttl { font-family: var(--mono); font-size: 12px; }
    .ttl-warn { color: var(--warn); }
    .empty { color: var(--text-muted); padding: 48px; text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    .denied { color: var(--danger); padding: 48px; text-align: center; }

    /* Session status */
    .status-provisioning { color: var(--warn); }
    .status-ready { color: var(--success); }

    /* Scenario status badges */
    .s-published { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; background:rgba(63,185,80,.15); color:var(--success); border:1px solid rgba(63,185,80,.3); }
    .s-draft     { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; background:rgba(210,153,34,.15); color:#d2991e; border:1px solid rgba(210,153,34,.3); }
    .s-archived  { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; background:rgba(255,255,255,.06); color:var(--text-muted); border:1px solid var(--border); }

    /* Buttons */
    .btn { padding: 4px 12px; border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s, color .15s; border: 1px solid; }
    .btn-kill   { background:transparent; border-color:var(--danger); color:var(--danger); }
    .btn-kill:hover { background:var(--danger); color:#fff; }
    .btn-pub    { background:transparent; border-color:var(--success); color:var(--success); }
    .btn-pub:hover { background:var(--success); color:#000; }
    .btn-unpub  { background:transparent; border-color:#d2991e; color:#d2991e; }
    .btn-unpub:hover { background:#d2991e; color:#000; }
    .btn-versions { background:transparent; border-color:var(--border); color:var(--text-muted); }
    .btn-versions:hover { border-color:var(--accent); color:var(--accent); }
    .btn-restore { background:transparent; border-color:var(--accent); color:var(--accent); font-size:11px; padding:2px 8px; }
    .btn-restore:hover { background:var(--accent); color:#000; }
    .btn:disabled { opacity:.4; cursor:default; pointer-events:none; }

    /* Versions drawer */
    .versions-row td { padding: 0; background: rgba(0,0,0,.2); }
    .versions-drawer { padding: 12px 16px; }
    .versions-drawer table { background: transparent; border: none; }
    .versions-drawer th, .versions-drawer td { padding: 7px 12px; font-size: 12px; border-bottom: 1px solid var(--border); }
    .versions-drawer tr:last-child td { border-bottom: none; }
    .v-comment { font-family: var(--mono); color: var(--text-muted); }
    .no-versions { color: var(--text-muted); font-size: 12px; padding: 8px 0; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-backdrop.hidden { display: none; }
    .modal-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 24px 28px; min-width: 360px; max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .modal-body  { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
    .modal-input {
      width: 100%; box-sizing: border-box;
      padding: 8px 10px; font-size: 13px; font-family: var(--mono);
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); outline: none; margin-bottom: 6px;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-hint { font-size: 11px; color: var(--text-muted); margin-bottom: 16px; }
    .modal-error { font-size: 12px; color: var(--danger); margin-bottom: 12px; min-height: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-modal-cancel { background: transparent; border-color: var(--border); color: var(--text-muted); }
    .btn-modal-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-modal-confirm { background: transparent; border-color: var(--danger); color: var(--danger); }
    .btn-modal-confirm:hover { background: var(--danger); color: #fff; }
    .btn-modal-primary { background: transparent; border-color: var(--accent); color: var(--accent); }
    .btn-modal-primary:hover { background: var(--accent); color: #000; }
  </style>
</head>
<body>
  <!-- Modal -->
  <div class="modal-backdrop hidden" id="modal-backdrop">
    <div class="modal-card" id="modal-card">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-body"  id="modal-body"></div>
      <input class="modal-input hidden" id="modal-input" type="text" autocomplete="off" />
      <div class="modal-hint hidden" id="modal-hint"></div>
      <div class="modal-error" id="modal-error"></div>
      <div class="modal-actions">
        <button class="btn btn-modal-cancel" id="modal-cancel">Cancel</button>
        <button class="btn btn-modal-primary" id="modal-ok">OK</button>
      </div>
    </div>
  </div>

  <nav>
    <span class="logo">UDS Labs</span>
    <span class="admin-badge">Admin</span>
    <a href="/" style="margin-left:auto;font-size:13px">← Catalog</a>
  </nav>
  <div class="admin-wrap">
    <div class="page-header">
      <h1>Admin</h1>
      <span class="refresh" id="last-refresh"></span>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-sessions" onclick="switchTab('sessions')">Sessions</button>
      <button class="tab-btn" id="tab-scenarios" onclick="switchTab('scenarios')">Scenarios</button>
      <button class="btn btn-pub" style="margin-left:auto;margin-bottom:1px;display:none" id="btn-new-scenario" onclick="newScenario()">+ New Scenario</button>
    </div>

    <div id="pane-sessions"><div class="empty">Loading…</div></div>
    <div id="pane-scenarios" style="display:none"><div class="empty">Loading…</div></div>
  </div>

  <script>
    // ── Modal helpers ────────────────────────────────────────────────────────
    function _modalClose() { document.getElementById('modal-backdrop').classList.add('hidden'); }

    function showConfirm(title, body, {onOk, danger = true} = {}) {
      const backdrop = document.getElementById('modal-backdrop');
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').textContent = body;
      document.getElementById('modal-input').classList.add('hidden');
      document.getElementById('modal-hint').classList.add('hidden');
      document.getElementById('modal-error').textContent = '';
      const okBtn = document.getElementById('modal-ok');
      okBtn.textContent = 'Confirm';
      okBtn.className = `btn ${danger ? 'btn-modal-confirm' : 'btn-modal-primary'}`;
      okBtn.disabled = false;
      backdrop.classList.remove('hidden');
      okBtn.onclick = () => { _modalClose(); onOk?.(); };
      document.getElementById('modal-cancel').onclick = _modalClose;
      backdrop.onclick = e => { if (e.target === backdrop) _modalClose(); };
    }

    function showInput(title, {hint = '', placeholder = '', onSubmit} = {}) {
      const backdrop = document.getElementById('modal-backdrop');
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').textContent = '';
      const input = document.getElementById('modal-input');
      input.value = '';
      input.placeholder = placeholder;
      input.classList.remove('hidden');
      const hintEl = document.getElementById('modal-hint');
      hintEl.textContent = hint;
      hintEl.classList.toggle('hidden', !hint);
      const errEl = document.getElementById('modal-error');
      errEl.textContent = '';
      const okBtn = document.getElementById('modal-ok');
      okBtn.textContent = 'Create';
      okBtn.className = 'btn btn-modal-primary';
      okBtn.disabled = false;
      backdrop.classList.remove('hidden');
      setTimeout(() => input.focus(), 50);

      async function trySubmit() {
        const val = input.value.trim();
        if (!val) { errEl.textContent = 'Required.'; return; }
        errEl.textContent = '';
        okBtn.disabled = true; okBtn.textContent = 'Creating…';
        const err = await onSubmit(val);
        if (err) {
          errEl.textContent = err;
          okBtn.disabled = false; okBtn.textContent = 'Create';
        } else {
          _modalClose();
        }
      }

      okBtn.onclick = trySubmit;
      input.onkeydown = e => { if (e.key === 'Enter') trySubmit(); };
      document.getElementById('modal-cancel').onclick = _modalClose;
      backdrop.onclick = e => { if (e.target === backdrop) _modalClose(); };
    }
    // ── End modal helpers ────────────────────────────────────────────────────

    // ── Tab switching ────────────────────────────────────────────────────────
    let activeTab = 'sessions';
    function switchTab(name) {
      activeTab = name;
      document.getElementById('pane-sessions').style.display  = name === 'sessions'  ? '' : 'none';
      document.getElementById('pane-scenarios').style.display = name === 'scenarios' ? '' : 'none';
      document.getElementById('tab-sessions').classList.toggle('active',  name === 'sessions');
      document.getElementById('tab-scenarios').classList.toggle('active', name === 'scenarios');
      document.getElementById('btn-new-scenario').style.display = name === 'scenarios' ? '' : 'none';
      if (name === 'scenarios') loadScenarios();
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Sessions ─────────────────────────────────────────────────────────────
    function minsLeft(ts) { return Math.round((new Date(ts) - Date.now()) / 60000); }
    function fmtTTL(ts) {
      const m = minsLeft(ts);
      if (m < 0)  return '<span style="color:var(--danger)">expired</span>';
      if (m < 10) return `<span class="ttl-warn">${m}m left</span>`;
      return `${m}m left`;
    }

    async function loadSessions() {
      const res = await fetch('/api/admin/sessions');
      if (res.status === 403) {
        document.getElementById('pane-sessions').innerHTML = '<div class="denied">Access denied — not an admin account.</div>';
        return;
      }
      const sessions = await res.json();
      document.getElementById('last-refresh').textContent = 'Refreshed ' + new Date().toLocaleTimeString();

      if (!sessions.length) {
        document.getElementById('pane-sessions').innerHTML = '<div class="empty">No active sessions.</div>';
        return;
      }
      const rows = sessions.map(s => `
        <tr>
          <td class="gh">@${esc(s.github_user || '—')}</td>
          <td>${esc(s.scenario)}</td>
          <td><span class="status-${esc(s.status)}">${esc(s.status)}</span></td>
          <td class="ttl">${esc(s.vm_ip || '—')}</td>
          <td class="ttl">${fmtTTL(s.expires_at)}</td>
          <td><button class="btn btn-kill" onclick="terminate('${esc(s.session_id)}',this)">Terminate</button></td>
        </tr>`).join('');
      document.getElementById('pane-sessions').innerHTML = `
        <table>
          <thead><tr><th>GitHub User</th><th>Scenario</th><th>Status</th><th>VM IP</th><th>Time Left</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function terminate(id, btn) {
      showConfirm(
        'Terminate session',
        'The VM will be destroyed and the user will be logged out. This cannot be undone.',
        {
          danger: true,
          onOk: async () => {
            btn.disabled = true; btn.textContent = 'Terminating…';
            await fetch(`/api/admin/sessions/${id}`, { method: 'DELETE' });
            loadSessions();
          }
        }
      );
    }

    // ── Scenarios ────────────────────────────────────────────────────────────
    let openVersionRow = null; // tracks which scenario's versions drawer is open

    async function loadScenarios() {
      const pane = document.getElementById('pane-scenarios');
      const res = await fetch('/api/admin/scenarios');
      if (res.status === 501) {
        pane.innerHTML = '<div class="empty">Scenario authoring requires <code>DB_PATH</code> to be configured.</div>';
        return;
      }
      if (res.status === 403) {
        pane.innerHTML = '<div class="denied">Access denied.</div>';
        return;
      }
      const scenarios = await res.json();
      if (!scenarios || !scenarios.length) {
        pane.innerHTML = '<div class="empty">No scenarios found.</div>';
        return;
      }

      const rows = scenarios.map(sc => {
        const statusBadge = `<span class="s-${esc(sc.status)}">${esc(sc.status)}</span>`;
        const pubBtn = sc.status !== 'published'
          ? `<button class="btn btn-pub"    onclick="publishScenario('${esc(sc.id)}',this)">Publish</button>`
          : `<button class="btn btn-unpub"  onclick="unpublishScenario('${esc(sc.id)}',this)">Unpublish</button>`;
        return `
          <tr id="sc-row-${esc(sc.id)}">
            <td><strong>${esc(sc.title || sc.id)}</strong><br><span style="font-size:11px;color:var(--text-muted)">${esc(sc.id)}</span></td>
            <td>${statusBadge}</td>
            <td class="ttl">${esc(sc.updated_at ? new Date(sc.updated_at).toLocaleString() : '—')}</td>
            <td style="display:flex;gap:6px;flex-wrap:wrap">
              <a class="btn btn-versions" href="/admin/scenarios/${esc(sc.id)}/edit" style="text-decoration:none">✏ Edit</a>
              ${pubBtn}
              <button class="btn btn-versions" onclick="toggleVersions('${esc(sc.id)}',this)">Versions</button>
            </td>
          </tr>`;
      }).join('');

      pane.innerHTML = `
        <table id="scenarios-table">
          <thead><tr><th>Scenario</th><th>Status</th><th>Last Updated</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function publishScenario(id, btn) {
      btn.disabled = true; btn.textContent = 'Publishing…';
      await fetch(`/api/admin/scenarios/${id}/publish`, { method: 'POST' });
      loadScenarios();
    }

    async function unpublishScenario(id, btn) {
      btn.disabled = true; btn.textContent = 'Unpublishing…';
      await fetch(`/api/admin/scenarios/${id}/unpublish`, { method: 'POST' });
      loadScenarios();
    }

    async function toggleVersions(id, btn) {
      const existing = document.getElementById(`versions-drawer-${id}`);
      if (existing) {
        existing.remove();
        btn.textContent = 'Versions';
        openVersionRow = null;
        return;
      }
      // Close any other open drawer.
      if (openVersionRow) {
        const prev = document.getElementById(`versions-drawer-${openVersionRow}`);
        if (prev) prev.remove();
      }
      openVersionRow = id;
      btn.textContent = 'Loading…';

      const res = await fetch(`/api/admin/scenarios/${id}/versions`);
      const versions = res.ok ? await res.json() : [];
      btn.textContent = 'Versions ▾';

      const row = document.getElementById(`sc-row-${id}`);
      const drawerRow = document.createElement('tr');
      drawerRow.className = 'versions-row';
      drawerRow.id = `versions-drawer-${id}`;
      drawerRow.innerHTML = `<td colspan="4">
        <div class="versions-drawer">
          <strong style="font-size:12px;color:var(--text-muted)">VERSION HISTORY</strong>
          ${!versions || !versions.length
            ? '<p class="no-versions">No versions yet. Publish the scenario to create the first snapshot.</p>'
            : `<table>
                <thead><tr><th>#</th><th>Comment</th><th>Created</th><th></th></tr></thead>
                <tbody>${versions.map(v => `
                  <tr>
                    <td class="ttl">${esc(v.id)}</td>
                    <td class="v-comment">${esc(v.comment)}</td>
                    <td class="ttl">${esc(new Date(v.created_at).toLocaleString())}</td>
                    <td><button class="btn btn-restore" onclick="restoreVersion('${esc(id)}','${esc(v.id)}',this)">Restore</button></td>
                  </tr>`).join('')}
                </tbody>
              </table>`}
        </div>
      </td>`;
      row.insertAdjacentElement('afterend', drawerRow);
    }

    function newScenario() {
      showInput('New scenario', {
        hint: 'Lowercase letters, digits, and hyphens only.',
        placeholder: 'my-new-scenario',
        onSubmit: async (id) => {
          const res = await fetch('/api/admin/scenarios', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id }),
          });
          if (res.status === 409) return `Scenario "${id}" already exists.`;
          if (!res.ok) return 'Failed to create scenario.';
          window.location.href = `/admin/scenarios/${encodeURIComponent(id)}/edit`;
          return null;
        }
      });
    }

    function restoreVersion(scenarioId, versionId, btn) {
      showConfirm(
        'Restore version',
        `Roll back to version ${versionId}? Current files will be snapshotted first.`,
        {
          danger: false,
          onOk: async () => {
            btn.disabled = true; btn.textContent = 'Restoring…';
            const res = await fetch(`/api/admin/scenarios/${scenarioId}/versions/${versionId}/restore`, { method: 'POST' });
            if (!res.ok) {
              btn.disabled = false; btn.textContent = 'Restore';
              const errSpan = btn.parentElement.querySelector('.restore-err') || (() => {
                const s = document.createElement('span');
                s.className = 'restore-err';
                s.style.cssText = 'color:var(--danger);font-size:11px;margin-left:6px';
                btn.after(s);
                return s;
              })();
              errSpan.textContent = 'Restore failed';
              return;
            }
            loadScenarios();
          }
        }
      );
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    loadSessions();
    setInterval(() => { if (activeTab === 'sessions') loadSessions(); }, 15000);
  </script>
</body>
</html>
