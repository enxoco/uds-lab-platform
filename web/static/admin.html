<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UDS Labs — Admin</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-wrap { max-width: 1000px; margin: 40px auto; padding: 0 24px; }
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .page-header h1 { font-size: 20px; font-weight: 600; }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(248,81,73,0.15);
      color: var(--danger);
      border: 1px solid rgba(248,81,73,0.3);
    }
    .refresh { margin-left: auto; font-size: 12px; color: var(--text-muted); }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    th, td {
      padding: 11px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    th { font-weight: 600; color: var(--text-muted); background: var(--bg); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:last-child td { border-bottom: none; }
    .gh { font-family: var(--mono); font-size: 13px; }
    .status-provisioning { color: var(--warn); }
    .status-ready { color: var(--success); }
    .ttl { font-family: var(--mono); font-size: 12px; }
    .ttl-warn { color: var(--warn); }
    .btn-kill {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-kill:hover { background: var(--danger); color: #fff; }
    .empty {
      color: var(--text-muted);
      padding: 48px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .denied { color: var(--danger); padding: 48px; text-align: center; }

    /* Tab nav */
    .tab-nav {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 8px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Demo links */
    .demo-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .demo-header h2 { font-size: 16px; font-weight: 600; flex: 1; }
    .btn-gen {
      padding: 7px 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-gen:hover { opacity: 0.85; }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      min-width: 80px;
    }
    .progress-fill {
      height: 100%;
      background: var(--success);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .copy-btn {
      padding: 3px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 420px;
      max-width: calc(100vw - 48px);
    }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .modal .form-group { margin-bottom: 16px; }
    .modal label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
    .modal select, .modal input {
      width: 100%; box-sizing: border-box;
      padding: 9px 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 13px; font-family: inherit;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .btn-cancel { padding: 8px 16px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 13px; cursor: pointer; }
    .btn-create { padding: 8px 16px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
    .share-result { margin-top: 16px; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); }
    .share-result p { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .share-url { font-family: var(--mono); font-size: 12px; word-break: break-all; color: var(--text); }
  </style>
</head>
<body>
  <nav>
    <span class="logo">UDS Labs</span>
    <span class="badge">Admin</span>
    <a href="/admin/csm" style="margin-left:auto;font-size:13px">CSM Dashboard →</a>
    <a href="/" style="font-size:13px">← Catalog</a>
  </nav>
  <div class="admin-wrap">
    <div class="page-header">
      <h1>Admin</h1>
      <span class="refresh" id="last-refresh"></span>
    </div>

    <div class="tab-nav" id="tab-nav">
      <button class="tab-btn active" onclick="switchTab('sessions')">Active Sessions</button>
      <button class="tab-btn" id="tab-btn-demo" style="display:none" onclick="switchTab('demo')">Demo Links</button>
    </div>

    <div class="tab-panel active" id="panel-sessions">
      <div id="content">Loading…</div>
    </div>

    <div class="tab-panel" id="panel-demo">
      <div class="demo-header">
        <h2>Demo Links</h2>
        <button class="btn-gen" onclick="openModal()">+ Generate Link</button>
      </div>
      <div id="demo-content">Loading…</div>
    </div>
  </div>

  <!-- Generate link modal -->
  <div class="modal-overlay" id="modal" onclick="closeModalIfBackdrop(event)">
    <div class="modal">
      <h3>Generate Demo Link</h3>
      <div class="form-group">
        <label>Scenario</label>
        <select id="modal-scenario"></select>
      </div>
      <div class="form-group">
        <label>Link expires in</label>
        <select id="modal-expires">
          <option value="24">24 hours</option>
          <option value="72" selected>72 hours (3 days)</option>
          <option value="168">7 days</option>
        </select>
      </div>
      <div class="share-result" id="share-result" style="display:none">
        <p>Share this link with your prospect:</p>
        <div class="share-url" id="share-url"></div>
        <div style="margin-top:10px">
          <button class="copy-btn" onclick="copyURL()">Copy link</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Close</button>
        <button class="btn-create" id="btn-create" onclick="createLink()">Generate</button>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'sessions';
    let scenarios = [];
    let generatedURL = '';

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function minsLeft(ts) {
      return Math.round((new Date(ts) - Date.now()) / 60000);
    }

    function fmtTTL(ts) {
      const m = minsLeft(ts);
      if (m < 0) return '<span style="color:var(--danger)">expired</span>';
      if (m < 10) return `<span class="ttl-warn">${m}m left</span>`;
      return `${m}m left`;
    }

    function fmtDate(ts) {
      if (!ts) return '—';
      return new Date(ts).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
      if (tab === 'demo') loadDemoTokens();
    }

    async function init() {
      const cfgRes = await fetch('/api/config');
      const cfg = await cfgRes.json();
      if (cfg.is_ae) {
        document.getElementById('tab-btn-demo').style.display = '';
      }
      loadSessions();
      const scRes = await fetch('/api/scenarios');
      if (scRes.ok) {
        scenarios = await scRes.json();
        const sel = document.getElementById('modal-scenario');
        sel.innerHTML = scenarios.map(s => `<option value="${esc(s.id)}">${esc(s.title)}</option>`).join('');
      }
    }

    async function loadSessions() {
      const res = await fetch('/api/admin/sessions');
      if (res.status === 403) {
        document.getElementById('content').innerHTML = '<div class="denied">Access denied — not an admin account.</div>';
        return;
      }
      const sessions = await res.json();
      document.getElementById('last-refresh').textContent = 'Refreshed ' + new Date().toLocaleTimeString();

      if (!sessions.length) {
        document.getElementById('content').innerHTML = '<div class="empty">No active sessions.</div>';
        return;
      }

      const rows = sessions.map(s => `
        <tr>
          <td class="gh">${esc(s.user_email || '—')}</td>
          <td>${esc(s.scenario)}</td>
          <td><span class="status-${esc(s.status)}">${esc(s.status)}</span></td>
          <td class="ttl">${esc(s.service_dns || '—')}</td>
          <td class="ttl">${fmtTTL(s.expires_at)}</td>
          <td><button class="btn-kill" onclick="terminate('${esc(s.session_id)}', this)">Terminate</button></td>
        </tr>
      `).join('');

      document.getElementById('content').innerHTML = `
        <table>
          <thead><tr>
            <th>User</th>
            <th>Scenario</th>
            <th>Status</th>
            <th>Service DNS</th>
            <th>Time Left</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function terminate(id, btn) {
      if (!confirm('Terminate this session? The VM will be destroyed and the user will be logged out.')) return;
      btn.disabled = true;
      btn.textContent = 'Terminating…';
      await fetch(`/api/admin/sessions/${id}`, { method: 'DELETE' });
      loadSessions();
    }

    async function loadDemoTokens() {
      const res = await fetch('/api/demo-tokens');
      if (!res.ok) {
        document.getElementById('demo-content').innerHTML = '<div class="empty">No demo links yet.</div>';
        return;
      }
      const tokens = await res.json();
      if (!tokens || !tokens.length) {
        document.getElementById('demo-content').innerHTML = '<div class="empty">No demo links yet. Click "Generate Link" to create one.</div>';
        return;
      }

      const rows = tokens.map(t => {
        const steps = t.total_steps > 0
          ? `<div class="progress-bar"><div class="progress-fill" style="width:${Math.round(t.steps_completed/t.total_steps*100)}%"></div></div> ${t.steps_completed}/${t.total_steps}`
          : '—';
        const exp = new Date(t.expires_at) < new Date() ? '<span style="color:var(--danger)">expired</span>' : fmtDate(t.expires_at);
        return `
          <tr>
            <td class="gh">${esc(t.prospect_email || '—')}</td>
            <td>${esc(t.scenario_id)}</td>
            <td>${steps}</td>
            <td>${t.last_active ? fmtDate(t.last_active) : '—'}</td>
            <td>${exp}</td>
            <td><button class="copy-btn" onclick="copyLink('${esc(t.share_url)}', this)">Copy link</button></td>
          </tr>
        `;
      }).join('');

      document.getElementById('demo-content').innerHTML = `
        <table>
          <thead><tr>
            <th>Prospect</th>
            <th>Scenario</th>
            <th>Progress</th>
            <th>Last Active</th>
            <th>Expires</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function openModal() {
      document.getElementById('share-result').style.display = 'none';
      document.getElementById('btn-create').style.display = '';
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      generatedURL = '';
      if (currentTab === 'demo') loadDemoTokens();
    }

    function closeModalIfBackdrop(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    }

    async function createLink() {
      const scenario = document.getElementById('modal-scenario').value;
      const expiresHours = parseInt(document.getElementById('modal-expires').value, 10);
      const btn = document.getElementById('btn-create');
      btn.disabled = true;
      btn.textContent = 'Generating…';

      try {
        const res = await fetch('/api/demo-tokens', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scenario, expires_hours: expiresHours }),
        });
        if (!res.ok) {
          alert('Failed to generate link. Please try again.');
          return;
        }
        const data = await res.json();
        generatedURL = data.share_url;
        document.getElementById('share-url').textContent = data.share_url;
        document.getElementById('share-result').style.display = 'block';
        btn.style.display = 'none';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate';
      }
    }

    function copyURL() {
      navigator.clipboard.writeText(generatedURL).then(() => {
        const btn = event.target;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy link', 2000);
      });
    }

    function copyLink(url, btn) {
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy link', 2000);
      });
    }

    init();
    setInterval(() => { if (currentTab === 'sessions') loadSessions(); }, 15000);
  </script>
</body>
</html>
