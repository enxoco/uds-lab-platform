includes:
  - attest: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.13.4/tasks/attest.yaml
  - build: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.13.4/tasks/build.yaml
  - olm: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.13.4/tasks/olm.yaml
  - publish: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.13.4/tasks/publish.yaml
  - scan: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.13.4/tasks/scan.yaml
  - setup: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.13.4/tasks/setup.yaml
  - vouch: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.13.4/tasks/vouch.yaml
  - uds-setup: https://raw.githubusercontent.com/defenseunicorns/uds-common/v1.24.14/tasks/setup.yaml

tasks:
  # ── Clean build artifacts ─────────────────────────────────────────────────────

  - name: clean-artifacts
    description: Remove all built Zarf packages, UDS bundles, and image tarballs
    inputs:
      skip:
        description: Set to 1 to skip artifact cleanup when WIPE_CLUSTER=0
        default: "0"
      clean:
        description: Clean artifacts (1 = clean)
        default: "1"
    actions:
      - description: Remove build artifacts
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ] || [ "${{ .inputs.clean }}" != "1" ]; then
            echo "Skipping artifact clean"
            exit 0
          fi
          echo "Cleaning build artifacts..."
          rm -f zarf-package-*.tar.zst lab-server.tar uds-lab-platform-*.tar
          rm -f bundle/uds-bundle-*.tar.zst
          rm -rf ~/.cache/zarf-tmp
          echo "Done."

  # ── Lint ─────────────────────────────────────────────────────────────────────

  - name: lint
    description: Run linters and static analysis
    actions:
      - description: Run golangci-lint
        cmd: golangci-lint run ./...

  # ── Build VM images ───────────────────────────────────────────────────────────
  # Full packer run takes 60+ min. Pass skip=1 to skip image builds entirely,
  # or skip individual tiers with skip_base/skip_uds_core.

  - name: build-images
    description: Build VM qcow2 images with packer (base → uds-core)
    inputs:
      skip:
        description: Skip all packer builds (1 = skip)
        default: "0"
      skip_base:
        description: Skip base image build
        default: "0"
      skip_uds_core:
        description: Skip UDS Core image build
        default: "0"
      build:
        description: Build packer images (1 = build)
        default: "1"
    actions:
      - description: Generate packer SSH keypair if not present
        cmd: |
          if [ ! -f packer/packer-key ]; then
            echo "Generating packer SSH keypair..."
            ssh-keygen -t ed25519 -f packer/packer-key -N "" -q
          fi
      - description: Build packer images
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ] || [ "${{ .inputs.build }}" != "1" ]; then
            echo "Skipping packer builds (skip=1)"
            exit 0
          fi
          cd packer
          SKIP_BASE="${{ .inputs.skip_base }}" \
          SKIP_UDS_CORE="${{ .inputs.skip_uds_core }}" \
          ./build-images-qemu.sh
        maxTotalSeconds: 7200

  # ── Atomic cluster-setup steps ───────────────────────────────────────────────
  # Each step is independently runnable. Composite tasks (cluster-up, dev)
  # compose these. Pass skip=1 to any step to no-op it from a composite task.

  - name: preflight
    description: Verify required tools, KVM access, and KubeVirt package directory
    inputs:
      kubevirt_pkg_dir:
        description: Path to local KubeVirt package directory
        default: $HOME/src/github.com/uds-packages/kubevirt
      cdi_pkg_dir:
        description: Path to local CDI operator package directory
        default: ../cdi-operator
    actions:
      - description: Check tools, KVM, and KubeVirt dir
        cmd: |
          FAILED=0
          for tool in kubectl zarf uds curl jq yq ip docker; do
            command -v "$tool" >/dev/null 2>&1 || { echo "ERROR: missing required tool: $tool"; FAILED=1; }
          done
          ls /dev/kvm >/dev/null 2>&1 || { echo "ERROR: /dev/kvm not found — enable KVM in BIOS (AMD-V / Intel VT-x)"; FAILED=1; }
          [ -d "${{ .inputs.kubevirt_pkg_dir }}" ] || { echo "ERROR: KubeVirt package dir not found: ${{ .inputs.kubevirt_pkg_dir }}"; FAILED=1; }
          [ -d "${{ .inputs.cdi_pkg_dir }}" ] || { echo "ERROR: CDI package dir not found: ${{ .inputs.cdi_pkg_dir }}"; FAILED=1; }
          [ "$FAILED" = "0" ] || exit 1
      - task: validate-package-config

  - name: validate-package-config
    description: Validate deployment ordering without building images
    actions:
      - description: Validate VM image server and CDI import lifecycle
        cmd: |
          set -euo pipefail
          VM_SERVER=packages/vm-images/manifests/image-server.yaml
          VM_MANIFEST=packages/vm-images/manifests/golden-pvcs.yaml
          test -f "$VM_SERVER" || { echo "ERROR: missing $VM_SERVER" >&2; exit 1; }
          test -f "$VM_MANIFEST" || { echo "ERROR: missing $VM_MANIFEST" >&2; exit 1; }
          rg -q 'image: ghcr.io/enxoco/lab-vm-images/base:' "$VM_SERVER"
          rg -q 'image: ghcr.io/enxoco/lab-vm-images/uds-core:' "$VM_SERVER"
          rg -q 'source:' "$VM_MANIFEST"
          rg -q 'http:' "$VM_MANIFEST"
          if rg -q 'registry:|secretRef:|ZARF_REGISTRY|CDI_REGISTRY|zarf-docker-registry' "$VM_MANIFEST"; then
            echo "ERROR: golden PVCs must import only through the image-server HTTP services" >&2
            exit 1
          fi
          echo "VM-image HTTP import preflight passed"

  - name: dry-run
    description: Render and validate Helm and Zarf packages without a cluster
    actions:
      - description: Run packaging contracts and Helm lint
        cmd: |
          set -euo pipefail
          GOCACHE=/tmp/uds-lab-go-cache go test . -run 'TestHelmChart|TestVMImagePackage|TestApplicationImage'
          helm lint chart
          helm template lab-platform chart \
            --namespace lab-platform \
            --set domain=example.test \
            --set provider=kubevirt \
            >/dev/null
      - description: Lint and render Zarf package definitions
        cmd: |
          set -euo pipefail
          VERSION=$(yq -r '.metadata.version' zarf.yaml)
          uds zarf dev lint . --set VM_IMAGE_TAG="$VERSION"
          uds zarf dev inspect manifests . \
            --create-set VM_IMAGE_TAG="$VERSION" \
            --deploy-set-variables DOMAIN=example.test \
            --deploy-set-variables PROVIDER=kubevirt \
            >/dev/null

  - name: wipe-k3s
    description: Uninstall k3s if present
    inputs:
      skip:
        description: Set to 1 to skip this step
        default: "0"
      run:
        description: Run this step (1 = run)
        default: "1"
    actions:
      - description: Uninstall k3s
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ] || [ "${{ .inputs.run }}" != "1" ]; then
            echo "Skipping k3s wipe (skip=1)"
            exit 0
          fi
          if [ -f /usr/local/bin/k3s-uninstall.sh ]; then
            echo "Uninstalling k3s..."
            sudo /usr/local/bin/k3s-uninstall.sh
            sleep 3
          else
            echo "k3s not installed — nothing to wipe"
          fi

  - name: install-k3s
    description: Install k3s with traefik and servicelb disabled
    inputs:
      skip:
        description: Set to 1 to skip this step
        default: "0"
      run:
        description: Run this step (1 = run)
        default: "1"
    actions:
      - description: Install k3s and copy kubeconfig
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ] || [ "${{ .inputs.run }}" != "1" ]; then
            echo "Skipping k3s install (skip=1)"
            exit 0
          fi
          # --disable=traefik  -> avoids gateway-api CRD conflict with UDS Core
          # --disable=servicelb -> replaced by MetalLB for separate admin+tenant IPs
          # Download and verify the binary first. The installer otherwise fetches
          # the checksum without retries, making transient GitHub failures fatal.
          K3S_VERSION=v1.36.2+k3s1
          K3S_RELEASE_VERSION=$(printf '%s' "$K3S_VERSION" | sed 's/+/%2B/g')
          K3S_TMP=$(mktemp -d)
          trap 'rm -rf "$K3S_TMP"' EXIT
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 \
            "https://github.com/k3s-io/k3s/releases/download/${K3S_RELEASE_VERSION}/k3s" \
            -o "$K3S_TMP/k3s"
          printf '%s  %s\n' \
            65a55ec56c24eab44383086166ec620a491952b7e23941a49ddca6e8a4c4b4de \
            "$K3S_TMP/k3s" | sha256sum --check --status
          sudo install -m 0755 "$K3S_TMP/k3s" /usr/local/bin/k3s
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 \
            https://get.k3s.io -o "$K3S_TMP/install.sh"
          INSTALL_K3S_SKIP_DOWNLOAD=true INSTALL_K3S_VERSION="$K3S_VERSION" \
            sh "$K3S_TMP/install.sh" --disable=traefik --disable=servicelb
          mkdir -p "$HOME/.kube"
          sudo cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
          sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
        maxTotalSeconds: 300
      - description: Wait for k3s node Ready
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ] || [ "${{ .inputs.run }}" != "1" ]; then exit 0; fi
          until kubectl get nodes >/dev/null 2>&1; do sleep 2; done
          kubectl wait node --all --for=condition=Ready --timeout=120s
          kubectl get nodes
        maxTotalSeconds: 130

  - name: install-metallb
    description: Install MetalLB and configure IP pool (auto-detects host subnet)
    inputs:
      skip:
        description: Set to 1 to skip this step
        default: "0"
      run:
        description: Run this step (1 = run)
        default: "1"
      version:
        description: MetalLB version
        default: v0.14.9
      range:
        description: "Override MetalLB IP range (auto-detected from host IP if empty)"
        default: ""
    actions:
      - description: Apply MetalLB manifests
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ] || [ "${{ .inputs.run }}" != "1" ]; then
            echo "Skipping MetalLB install (skip=1)"
            exit 0
          fi
          kubectl apply -f "https://raw.githubusercontent.com/metallb/metallb/${{ .inputs.version }}/config/manifests/metallb-native.yaml"
        maxTotalSeconds: 120
      - description: Wait for MetalLB controller
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ] || [ "${{ .inputs.run }}" != "1" ]; then exit 0; fi
          kubectl wait -n metallb-system deployment/controller --for=condition=Available --timeout=120s
          kubectl rollout status daemonset/speaker -n metallb-system --timeout=60s || true
        maxTotalSeconds: 130
      - description: Configure MetalLB IP pool
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ] || [ "${{ .inputs.run }}" != "1" ]; then exit 0; fi
          RANGE="${{ .inputs.range }}"
          if [ -z "$RANGE" ]; then
            LOCAL_IP=$(ip route get 8.8.8.8 2>/dev/null | grep -oP 'src \K[^ ]+' || true)
            [ -n "$LOCAL_IP" ] || { echo "ERROR: cannot detect local IP — set range input: --with range=x.x.x.a-x.x.x.b"; exit 1; }
            SUBNET=$(echo "$LOCAL_IP" | cut -d. -f1-3)
            RANGE="${SUBNET}.200-${SUBNET}.250"
          fi
          echo "MetalLB pool: $RANGE"
          kubectl apply -f - <<EOF
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: local-pool
            namespace: metallb-system
          spec:
            addresses:
            - ${RANGE}
          ---
          apiVersion: metallb.io/v1beta1
          kind: L2Advertisement
          metadata:
            name: local-adv
            namespace: metallb-system
          EOF

  - name: zarf-init
    description: Initialize Zarf in the cluster
    inputs:
      skip:
        description: Set to 1 to skip this step
        default: "0"
      run:
        description: Run this step (1 = run)
        default: "1"
    actions:
      - description: Run zarf init
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ] || [ "${{ .inputs.run }}" != "1" ]; then
            echo "Skipping zarf init (skip=1)"
            exit 0
          fi
          ZARF_INIT_LOG=$(mktemp)
          trap 'rm -f "$ZARF_INIT_LOG"' EXIT
          ZARF_INIT_ATTEMPT=1
          while [ "$ZARF_INIT_ATTEMPT" -le 3 ]; do
            : > "$ZARF_INIT_LOG"
            if zarf init --confirm > "$ZARF_INIT_LOG" 2>&1; then
              cat "$ZARF_INIT_LOG"
              break
            fi
            cat "$ZARF_INIT_LOG"
            if ! grep -q 'failed to delete injector resources: configmaps "zarf-payload-' "$ZARF_INIT_LOG"; then
              exit 1
            fi
            if [ "$ZARF_INIT_ATTEMPT" -eq 3 ]; then
              echo "Zarf init failed after 3 injector cleanup retries" >&2
              exit 1
            fi
            echo "Retrying Zarf init after injector ConfigMap cleanup race (attempt $((ZARF_INIT_ATTEMPT + 1))/3)..." >&2
            kubectl -n zarf delete pod/injector service/zarf-injector configmap/rust-binary --ignore-not-found
            for resource in $(kubectl -n zarf get configmaps -o name | grep '^configmap/zarf-payload-' || true); do
              kubectl -n zarf delete "$resource" --ignore-not-found
            done
            ZARF_INIT_ATTEMPT=$((ZARF_INIT_ATTEMPT + 1))
          done
        maxTotalSeconds: 600

  - name: build-kubevirt
    description: Build KubeVirt Zarf package in the KubeVirt package directory
    inputs:
      dir:
        description: Path to KubeVirt package directory
        default: $HOME/src/github.com/uds-packages/kubevirt
      skip_if_exists:
        description: Skip rebuild if a package tarball already exists (set to 1)
        default: "0"
      rebuild:
        description: Rebuild package (1 = rebuild)
        default: "1"
    actions:
      - description: Build KubeVirt package
        cmd: |
          cd "${{ .inputs.dir }}"
          if [ "${{ .inputs.skip_if_exists }}" = "1" ] || [ "${{ .inputs.rebuild }}" != "1" ]; then
            EXISTING=$(ls zarf-package-kubevirt-amd64-*-upstream.tar.zst 2>/dev/null | tail -1)
            if [ -n "$EXISTING" ]; then
              echo "Existing package found ($EXISTING) — skipping rebuild"
              exit 0
            fi
          fi
          zarf package create . -f upstream --confirm
        maxTotalSeconds: 3600

  - name: build-cdi
    description: Build the standalone CDI operator Zarf package
    inputs:
      dir:
        description: Path to the CDI operator package directory
        default: ../cdi-operator
    actions:
      - description: Build CDI package
        cmd: |
          cd "${{ .inputs.dir }}"
          uds run lint
          uds run test-render
          uds run build
        maxTotalSeconds: 1200

  - name: build-vm-images
    description: |
      Build VM image server container images from packer qcow2 outputs.
      Images are tagged for ghcr.io and loaded into the local Docker daemon.
      Run uds run build-images first to produce the qcow2 files.
      Push to registry with: uds run push-vm-images
    inputs:
      build:
        description: Build local VM image-server containers (1 = build)
        default: "1"
      base_qcow2:
        description: Path to base qcow2 (combined base+tools image)
        default: packer/output/base/lab-base.qcow2
      uds_core_qcow2:
        description: Path to uds-core qcow2
        default: packer/output/uds-core/lab-playground-uds-core.qcow2
      tag:
        description: Image tag (defaults to package version)
        default: ""
    actions:
      - description: Build OCI container images from qcow2 files
        maxTotalSeconds: 600
        cmd: |
          if [ "${{ .inputs.build }}" != "1" ]; then
            echo "Skipping local VM image container builds"
            exit 0
          fi
          TAG="${{ .inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(grep '^  version:' zarf.yaml | head -1 | awk '{print $2}')
          fi
          build_image() {
            local name="$1" dockerfile="$2" context_dir="$3"
            if [ ! -d "$context_dir" ] || [ -z "$(ls "$context_dir"/*.qcow2 2>/dev/null)" ]; then
              echo "SKIP: no qcow2 in $context_dir — skipping $name"
              return 0
            fi
            echo "Building ghcr.io/enxoco/lab-vm-images/${name}:${TAG}..."
            docker build -t "ghcr.io/enxoco/lab-vm-images/${name}:${TAG}" -f "$dockerfile" "$context_dir"
          }
          build_image base     packages/vm-images/Dockerfile.base     "$(dirname "${{ .inputs.base_qcow2 }}")"
          build_image uds-core packages/vm-images/Dockerfile.uds-core "$(dirname "${{ .inputs.uds_core_qcow2 }}")"

  - name: push-vm-images
    description: Push VM image server container images to ghcr.io
    inputs:
      tag:
        description: Image tag to push (defaults to package version)
        default: ""
    actions:
      - description: Push VM images to registry
        maxTotalSeconds: 600
        cmd: |
          TAG="${{ .inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(grep '^  version:' zarf.yaml | head -1 | awk '{print $2}')
          fi
          for name in base uds-core; do
            echo "Pushing ghcr.io/enxoco/lab-vm-images/${name}:${TAG}..."
            docker push "ghcr.io/enxoco/lab-vm-images/${name}:${TAG}"
          done

  - name: build-image
    description: Build the lab-platform Docker image tagged for ghcr.io
    actions:
      - description: Build Docker image
        cmd: |
          VERSION=$(grep '^  version:' zarf.yaml | head -1 | awk '{print $2}')
          docker build -t "ghcr.io/enxoco/uds-lab-platform:${VERSION}" .
        maxTotalSeconds: 600

  - name: push-image
    description: Push the lab-platform Docker image to ghcr.io
    actions:
      - description: Push image to registry
        cmd: |
          VERSION=$(grep '^  version:' zarf.yaml | head -1 | awk '{print $2}')
          docker push "ghcr.io/enxoco/uds-lab-platform:${VERSION}"
        maxTotalSeconds: 600

  - name: build-lab-package
    description: Build the uds-lab-platform Zarf package (includes lab-server, vm-image-server, golden-pvcs)
    inputs:
      vm_image_tag:
        description: VM image tag (defaults to package version)
        default: ""
    actions:
      - description: Build Zarf package
        cmd: |
          TAG="${{ .inputs.vm_image_tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(grep '^  version:' zarf.yaml | head -1 | awk '{print $2}')
          fi
          mkdir -p ~/.cache/zarf-tmp
          zarf package create . --confirm --set VM_IMAGE_TAG="$TAG" --tmpdir ~/.cache/zarf-tmp
        maxTotalSeconds: 600

  - name: build-bundle
    description: Build the UDS bundle from bundle/
    actions:
      - description: Create UDS bundle
        cmd: |
          BUNDLE_TMPDIR="${ZARF_TMPDIR:-$HOME/.cache/zarf-tmp}"
          mkdir -p "$BUNDLE_TMPDIR"
          uds create bundle --confirm --tmpdir "$BUNDLE_TMPDIR"
        maxTotalSeconds: 600

  - name: deploy-bundle
    description: Deploy the latest UDS bundle tarball from bundle/
    actions:
      - description: Deploy bundle
        cmd: |
          BUNDLE=$(ls bundle/uds-bundle-uds-lab-platform-*.tar.zst 2>/dev/null | tail -1)
          [ -n "$BUNDLE" ] || { echo "ERROR: no bundle found in bundle/ — run build-bundle first"; exit 1; }
          echo "Deploying: $BUNDLE"
          uds deploy "$BUNDLE" --confirm
        maxTotalSeconds: 3600

  - name: wait-kubevirt
    description: Wait for KubeVirt to reach Available status
    actions:
      - description: Wait for KubeVirt Available
        cmd: kubectl -n kubevirt wait kubevirt kubevirt --for=condition=Available --timeout=300s
        maxTotalSeconds: 310

  - name: patch-demo-routes
    description: |
      Exempt /demo and /api/demo-sessions from Istio authservice and JWT auth.
      Pepr overwrites these policies on every Package CR reconciliation — re-run
      after any Helm upgrade: uds run patch-demo-routes
    inputs:
      namespace:
        description: Namespace containing the lab-platform Package CR
        default: lab-platform
    actions:
      - description: Wait for authservice AuthorizationPolicy
        cmd: |
          NS="${{ .inputs.namespace }}"
          deadline=$(( $(date +%s) + 120 ))
          until kubectl get authorizationpolicy uds-lab-platform-authservice -n "$NS" >/dev/null 2>&1; do
            [ "$(date +%s)" -gt "$deadline" ] && { echo "ERROR: timed out waiting for authservice policy"; exit 1; }
            sleep 3
          done
          echo "uds-lab-platform-authservice ready"
        maxTotalSeconds: 130
      - description: Wait for jwt-authz AuthorizationPolicy
        cmd: |
          NS="${{ .inputs.namespace }}"
          deadline=$(( $(date +%s) + 120 ))
          until kubectl get authorizationpolicy uds-lab-platform-jwt-authz -n "$NS" >/dev/null 2>&1; do
            [ "$(date +%s)" -gt "$deadline" ] && { echo "ERROR: timed out waiting for jwt-authz policy"; exit 1; }
            sleep 3
          done
          echo "uds-lab-platform-jwt-authz ready"
        maxTotalSeconds: 130
      - description: Patch authservice policy to exclude demo routes
        maxTotalSeconds: 30
        cmd: |
          kubectl patch authorizationpolicy uds-lab-platform-authservice \
            -n "${{ .inputs.namespace }}" \
            --type=json \
            -p='[{"op":"add","path":"/spec/rules/0/to","value":[{"operation":{"notPaths":["/demo","/demo/*","/api/demo-sessions"]}}]}]'
      - description: Patch jwt-authz policy to exclude demo routes
        maxTotalSeconds: 30
        cmd: |
          kubectl patch authorizationpolicy uds-lab-platform-jwt-authz \
            -n "${{ .inputs.namespace }}" \
            --type=json \
            -p='[{"op":"add","path":"/spec/rules/0/to","value":[{"operation":{"notPaths":["/demo","/demo/*","/api/demo-sessions"]}}]}]'

  - name: populate-golden-pvcs
    description: Import pre-built qcow2 images into golden PVCs (auto-skips if qcow2s not found)
    inputs:
      skip:
        description: Set to 1 to force-skip import regardless of file presence
        default: "0"
      base_qcow2:
        description: Path to base qcow2
        default: packer/output/base/lab-base.qcow2
      uds_core_qcow2:
        description: Path to UDS Core qcow2
        default: packer/output/uds-core/lab-playground-uds-core.qcow2
      namespace:
        description: Namespace for golden PVCs
        default: uds-lab-vms
    actions:
      - description: Import golden PVCs
        maxTotalSeconds: 600
        cmd: |
          if [ "${{ .inputs.skip }}" = "1" ]; then
            echo "Skipping golden PVC import (skip=1)"
            exit 0
          fi
          import_args=()
          [ -f "${{ .inputs.base_qcow2 }}" ]     && import_args+=("BASE_QCOW2=${{ .inputs.base_qcow2 }}")
          [ -f "${{ .inputs.uds_core_qcow2 }}" ] && import_args+=("UDS_CORE_QCOW2=${{ .inputs.uds_core_qcow2 }}")
          if [ ${#import_args[@]} -eq 0 ]; then
            echo "No qcow2 files found at expected paths — skipping golden PVC import"
            echo "Build images first:  uds run build-images"
            echo "VM provisioning will fail until golden PVCs are populated!"
            exit 0
          fi
          env "${import_args[@]}" GOLDEN_NAMESPACE="${{ .inputs.namespace }}" \
            ./scripts/create-golden-pvc.sh

  - name: verify-cluster
    description: Print cluster node and workload status summary
    actions:
      - description: Cluster status summary
        cmd: |
          kubectl get nodes
          kubectl -n kubevirt get kubevirt kubevirt \
            -o jsonpath='KubeVirt status: {.status.phase}{"\n"}' || true
          echo "Non-running pods (if any):"
          kubectl get pods -A | grep -v Running | grep -v Completed | grep -v NAME || true

  # ── Composite cluster-setup task ─────────────────────────────────────────────
  # Replaces scripts/dev-cluster-setup.sh. Composes the atomic tasks above.
  # k3s install requires sudo — run `sudo -v` before starting if your sudo
  # session has timed out.

  - name: cluster-up
    description: |
      Full cluster setup: preflight, k3s, MetalLB, zarf init, KubeVirt, bundle deploy, demo patch, golden PVCs, verify.
      WIPE_CLUSTER=0 — keep existing k3s, skip reinstall (also skips MetalLB and zarf init).
      SKIP_GOLDEN_PVC=1 — skip the optional host HTTP fallback (default: use packaged image servers).
    inputs:
      WIPE_CLUSTER:
        description: Wipe and reinstall k3s (1 = wipe)
        default: "1"
      SKIP_GOLDEN_PVC:
        description: Force-skip host HTTP fallback (default 1 = use packaged image servers)
        default: "1"
      KUBEVIRT_PKG_DIR:
        description: Path to local KubeVirt package directory
        default: $HOME/src/github.com/uds-packages/kubevirt
      CDI_PKG_DIR:
        description: Path to local CDI operator package directory
        default: ../cdi-operator
      BUILD_IMAGES:
        description: Build local packer images (1 = build)
        default: "0"
      SKIP_BASE:
        description: Skip base image build
        default: "0"
      SKIP_UDS_CORE:
        description: Skip UDS Core image build
        default: "0"
      VM_IMAGE_TAG:
        description: VM image tag (defaults to package version)
        default: ""
      LOCAL_VM_IMAGES:
        description: Build and embed local VM image-server containers instead of pulling published images
        default: "0"
    actions:
      - task: preflight
        with:
          kubevirt_pkg_dir: ${{ .inputs.KUBEVIRT_PKG_DIR }}
          cdi_pkg_dir: ${{ .inputs.CDI_PKG_DIR }}
      - task: wipe-k3s
        with:
          run: ${{ .inputs.WIPE_CLUSTER }}
      - task: install-k3s
        with:
          run: ${{ .inputs.WIPE_CLUSTER }}
      - task: install-metallb
        with:
          run: ${{ .inputs.WIPE_CLUSTER }}
      - task: zarf-init
        with:
          run: ${{ .inputs.WIPE_CLUSTER }}
      - task: build-images
        with:
          build: ${{ .inputs.BUILD_IMAGES }}
          skip_base: ${{ .inputs.SKIP_BASE }}
          skip_uds_core: ${{ .inputs.SKIP_UDS_CORE }}
      - task: build-kubevirt
        with:
          dir: ${{ .inputs.KUBEVIRT_PKG_DIR }}
          rebuild: ${{ .inputs.WIPE_CLUSTER }}
      - task: build-cdi
        with:
          dir: ${{ .inputs.CDI_PKG_DIR }}
      - task: build-vm-images
        with:
          build: ${{ .inputs.LOCAL_VM_IMAGES }}
          tag: ${{ .inputs.VM_IMAGE_TAG }}
      - task: build-image
      - task: build-lab-package
        with:
          vm_image_tag: ${{ .inputs.VM_IMAGE_TAG }}
      - task: build-bundle
      - task: deploy-bundle
      - task: wait-kubevirt
      - task: patch-demo-routes
      - task: populate-golden-pvcs
        with:
          skip: ${{ .inputs.SKIP_GOLDEN_PVC }}
      - task: verify-cluster

  # ── CoreDNS patch ─────────────────────────────────────────────────────────────

  - name: patch-coredns
    description: Patch CoreDNS to route *.uds.dev to MetalLB gateways
    actions:
      - description: Patch CoreDNS NodeHosts
        maxTotalSeconds: 180
        cmd: ./scripts/patch-coredns.sh

  # ── Keycloak test user ────────────────────────────────────────────────────────

  - name: create-test-user
    description: Create test Keycloak user (doug@uds.dev / unicorn123!@#UN) in /UDS Core/Admin
    actions:
      - task: uds-setup:keycloak-user
        with:
          group: "/UDS Core/Admin"

  # ── nginx SNI proxy ───────────────────────────────────────────────────────────

  - name: start-proxy
    description: Start nginx SNI reverse proxy (auto-detects MetalLB IPs)
    actions:
      - description: Generate nginx.conf and start proxy
        cmd: |
          export KUBECONFIG="${KUBECONFIG:-$HOME/.kube/config}"
          ADMIN_IP=$(kubectl get svc admin-ingressgateway -n istio-admin-gateway \
            --request-timeout=30s -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          TENANT_IP=$(kubectl get svc tenant-ingressgateway -n istio-tenant-gateway \
            --request-timeout=30s -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          if [ -z "$ADMIN_IP" ] || [ -z "$TENANT_IP" ]; then
            echo "WARNING: could not detect gateway IPs — run ./scripts/start-proxy.sh manually after cluster is up"
            exit 0
          fi
          echo "Admin: $ADMIN_IP  Tenant: $TENANT_IP"
          cat > hack/proxy/nginx.conf << NGINX_EOF
          worker_processes 1;
          events { worker_connections 1024; }
          stream {
              map \$ssl_preread_server_name \$backend_443 {
                  ~*\.admin\.uds\.dev  ${ADMIN_IP}:443;
                  default              ${TENANT_IP}:443;
              }
              map \$ssl_preread_server_name \$backend_80 {
                  ~*\.admin\.uds\.dev  ${ADMIN_IP}:80;
                  default              ${TENANT_IP}:80;
              }
              server { listen 443; proxy_pass \$backend_443; ssl_preread on; }
              server { listen 80; proxy_pass \$backend_80; }
          }
          NGINX_EOF
          docker compose -f hack/proxy/docker-compose.yaml up -d

  - name: stop-proxy
    description: Stop nginx SNI reverse proxy
    actions:
      - description: Stop nginx proxy
        cmd: docker compose -f hack/proxy/docker-compose.yaml down

  # ── Fast redeploy (no cluster wipe) ──────────────────────────────────────────
  # Rebuilds image + package + bundle, deploys, re-applies demo route patch.
  # Use when iterating on server or operator code without wiping the cluster.

  - name: redeploy
    description: Rebuild and redeploy only lab-platform without touching infrastructure packages
    inputs:
      vm_image_tag:
        description: VM image tag (defaults to package version)
        default: ""
    actions:
      - task: build-image
      - task: build-lab-package
        with:
          vm_image_tag: ${{ .inputs.vm_image_tag }}
      - description: Deploy lab-platform package
        cmd: |
          PACKAGE=$(ls zarf-package-uds-lab-platform-amd64-*.tar.zst 2>/dev/null | tail -1)
          [ -n "$PACKAGE" ] || { echo "ERROR: lab-platform package not found"; exit 1; }
          zarf package deploy "$PACKAGE" --confirm
      - task: patch-demo-routes
      - description: Restart deployments
        cmd: |
          kubectl rollout restart deployment/lab-operator deployment/lab-platform -n lab-platform
          echo ""
          echo "Redeploy complete."
          echo "  Logs: kubectl logs -n lab-platform -l app=lab-operator -f"
        maxTotalSeconds: 120

  # ── Smoke test ───────────────────────────────────────────────────────────────
  # Run after every deploy to catch broken state before the user hits it.
  # Exits non-zero on any failure so CI and uds run dev surface problems early.

  - name: smoke-test
    description: Verify the deployed stack is healthy (golden PVCs, auth patches, platform pod)
    actions:
      - description: Check golden PVCs are Succeeded
        maxTotalSeconds: 1800
        cmd: |
          NS="uds-lab-vms"
          DEADLINE=$(( $(date +%s) + 1500 ))
          while true; do
            FAILED=0
            PENDING=0
            for pvc in golden-base golden-uds-core; do
              phase=$(kubectl get datavolume "$pvc" -n "$NS" \
                -o jsonpath='{.status.phase}' 2>/dev/null || echo "missing")
              case "$phase" in
                Succeeded)
                  echo "  ✔ $pvc ($phase)"
                  ;;
                missing)
                  echo "  ✘ $pvc — DataVolume missing; bundle deployment did not create VM-image resources" >&2
                  echo "  Check the Deploy bundle output above this smoke test" >&2
                  kubectl get namespaces >&2 || true
                  kubectl get pods -A >&2 || true
                  exit 1
                  ;;
                Failed)
                  echo "  ✘ $pvc — phase: $phase"
                  kubectl describe datavolume "$pvc" -n "$NS" || true
                  FAILED=1
                  ;;
                *)
                  echo "  … $pvc — phase: $phase"
                  PENDING=1
                  ;;
              esac
            done
            [ "$FAILED" = "0" ] || {
              echo "CDI import failed; inspect with: kubectl get pods -n cdi" >&2
              exit 1
            }
            [ "$PENDING" = "0" ] && break
            if [ "$(date +%s)" -gt "$DEADLINE" ]; then
              echo "Golden PVC imports timed out; inspect with:" >&2
              echo "  kubectl get datavolumes -n $NS -o yaml" >&2
              echo "  kubectl get pods -n cdi" >&2
              echo "  kubectl get events -n $NS --sort-by=.lastTimestamp" >&2
              exit 1
            fi
            sleep 10
          done
      - description: Check AuthorizationPolicy demo-route patches
        maxTotalSeconds: 30
        cmd: |
          FAILED=0
          NS="lab-platform"
          for pol in uds-lab-platform-authservice uds-lab-platform-jwt-authz; do
            has_to=$(kubectl get authorizationpolicy "$pol" -n "$NS" \
              -o jsonpath='{.spec.rules[0].to}' 2>/dev/null || echo "")
            if [ -n "$has_to" ]; then
              echo "  ✔ $pol has notPaths exemption"
            else
              echo "  ✘ $pol missing notPaths — /demo and /api/demo-sessions will require auth"
              FAILED=1
            fi
          done
          [ "$FAILED" = "0" ] || { echo "Fix: uds run patch-demo-routes"; exit 1; }
      - description: Check lab-platform pod is Running
        maxTotalSeconds: 30
        cmd: |
          NS="lab-platform"
          NOT_RUNNING=$(kubectl get pods -n "$NS" -l app=lab-platform \
            --field-selector=status.phase!=Running \
            -o name 2>/dev/null | head -5)
          RUNNING=$(kubectl get pods -n "$NS" -l app=lab-platform \
            --field-selector=status.phase=Running \
            -o name 2>/dev/null | head -1)
          if [ -n "$RUNNING" ] && [ -z "$NOT_RUNNING" ]; then
            echo "  ✔ lab-platform pod Running"
          else
            echo "  ✘ lab-platform pod not Running"
            kubectl get pods -n "$NS" -l app=lab-platform 2>/dev/null || true
            exit 1
          fi
      - description: Check authservice is running without OIDC errors
        maxTotalSeconds: 30
        cmd: |
          # JWKS is fetched lazily on first SSO request, not at startup — don't
          # check for that log line. Instead verify the pod is stable and has no
          # OIDC configuration errors in recent logs.
          RESTARTS=$(kubectl get pod -n authservice \
            -l app.kubernetes.io/name=authservice \
            -o jsonpath='{.items[0].status.containerStatuses[0].restartCount}' 2>/dev/null || echo "unknown")
          ERRORS=$(kubectl logs -n authservice deployment/authservice --since=120s 2>/dev/null \
            | grep -i "error.*oidc\|failed.*fetch\|failed.*jwk\|failed.*openid" || true)
          if [ "$RESTARTS" = "0" ] && [ -z "$ERRORS" ]; then
            echo "  ✔ authservice running (restarts: 0, no OIDC errors)"
          elif [ -n "$ERRORS" ]; then
            echo "  ✘ authservice has OIDC errors — JWT verification will fail"
            echo "$ERRORS"
            echo "    Fix: ./scripts/patch-coredns.sh"
            exit 1
          else
            echo "  ⚠ authservice restarts: $RESTARTS — may indicate DNS/Keycloak issue"
            echo "    Check: kubectl logs -n authservice deploy/authservice"
          fi

  # ── Full e2e dev workflow ─────────────────────────────────────────────────────
  # Composes: build-images + cluster-up + patch-coredns + start-proxy + test user.
  #
  # Common invocations:
  #   uds run dev                              # use published VM package, wipe cluster
  #   uds run dev --with BUILD_IMAGES=1 --with LOCAL_VM_IMAGES=1
  #                                            # build and package local VM images
  #   uds run dev --with WIPE_CLUSTER=0        # keep k3s, redeploy packages
  #   uds run dev --with LOCAL_VM_IMAGES=1 --with WIPE_CLUSTER=0

  - name: dev
    description: "Full e2e: set up cluster, deploy platform, configure access"
    inputs:
      BUILD_IMAGES:
        description: Build local packer images (1 = build; default uses published VM images from registry)
        default: "0"
      SKIP_BASE:
        description: Skip base image build
        default: "0"
      SKIP_UDS_CORE:
        description: Skip UDS Core image build
        default: "0"
      WIPE_CLUSTER:
        description: Wipe and reinstall k3s (1 = wipe)
        default: "1"
      SKIP_GOLDEN_PVC:
        description: Force-skip host HTTP fallback (default 1 = use packaged image servers)
        default: "1"
      VM_IMAGE_TAG:
        description: VM image tag (defaults to package version)
        default: ""
      LOCAL_VM_IMAGES:
        description: Build and embed local VM image-server containers instead of pulling published images
        default: "0"
    actions:
      - task: clean-artifacts
        with:
          clean: ${{ .inputs.WIPE_CLUSTER }}
      - task: cluster-up
        with:
          WIPE_CLUSTER: ${{ .inputs.WIPE_CLUSTER }}
          SKIP_GOLDEN_PVC: ${{ .inputs.SKIP_GOLDEN_PVC }}
          BUILD_IMAGES: ${{ .inputs.BUILD_IMAGES }}
          SKIP_BASE: ${{ .inputs.SKIP_BASE }}
          SKIP_UDS_CORE: ${{ .inputs.SKIP_UDS_CORE }}
          VM_IMAGE_TAG: ${{ .inputs.VM_IMAGE_TAG }}
          LOCAL_VM_IMAGES: ${{ .inputs.LOCAL_VM_IMAGES }}
      - task: patch-coredns
      - task: start-proxy
      - task: create-test-user
      - task: smoke-test
      - description: Dev environment ready
        cmd: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "  UDS Lab Platform — dev environment ready"
          echo ""
          echo "  UI:    https://lab.uds.dev"
          echo "  Admin: https://keycloak.admin.uds.dev"
          echo ""
          echo "  Test user: doug@uds.dev / unicorn123!@#UN"
          echo "  Group:     /UDS Core/Admin"
          echo "╚══════════════════════════════════════════════════════════╝"
