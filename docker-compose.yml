services:
  coder:
    image: ghcr.io/coder/coder:latest
    ports:
      - "3000:3000"
    environment:
      CODER_PG_CONNECTION_URL: "postgresql://coder:coder@postgres/coder?sslmode=disable"
      CODER_HTTP_ADDRESS: "0.0.0.0:3000"
      CODER_ACCESS_URL: "${CODER_ACCESS_URL:-http://localhost:3000}"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: coder
      POSTGRES_DB: coder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
