name: CI

# Artifacts produced by this workflow:
#   - zarf-package-uds-lab-platform-amd64-<version>.tar.zst  → published to UDS Army pipeline
#
# The lab-platform image is built locally and embedded in the zarf package by
# `zarf package create`. It is NOT pushed to GHCR separately — the zarf package
# and UDS bundle are the sole release artifacts.
#
# The UDS bundle (bundle/uds-bundle.yaml) depends on ghcr.io/uds-packages/kubevirt,
# a Defense Unicorns internal package. Never add bundle-build or bundle-publish
# steps to this workflow.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases on tag pushes
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: defenseunicorns-udm/udm-common/.github/actions/uds-cli-setup@9aaad66b21c7637b5be3d6aafdb21c9e7ff1df2a # v0.10.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin
      - run: |
          uds run olm:generate-fulcio-token \
            --with olm_cat="cat-api.uds-mil.us" \
            --with olm_org="uds-army-demo" \
            --with github_token="${{ secrets.GITHUB_TOKEN }}"
      - name: Lint
        run: uds run attest:lint
      - name: Security scan
        run: |
          uds run scan:security \
            --with gitleaks_scan_path="." \
            --with opengrep_scan_path="."

      # Build the image into the local Docker daemon so zarf package create can
      # embed it. No registry push — the image lives only inside the zarf package.
      - name: Build image
        if: github.event_name == 'push'
        run: uds run build:image

      # Builds zarf.yaml only. ZARF_VAR_IMAGE matches the tag built above so
      # Zarf finds the image in the local daemon and embeds it in the package.
      # The UDS bundle (bundle/) must be built on internal DU infrastructure.
      - name: Build zarf package
        if: github.event_name == 'push'
        run: uds run build:zarf-package

      - name: Vouch
        if: github.event_name == 'push'
        run: |
          uds run vouch:package \
            --with attestations="lint-witness.json,gitleaks-witness.json,opengrep-witness.json,zarf-create-witness.json" \
            --with sarif_files="gitleaks.sarif.json,opengrep.sarif.json" \
            --with olm_cat="cat-api.uds-mil.us" \
            --with olm_org="uds-army-demo"

      - name: Publish zarf package
        if: github.event_name == 'push'
        run: |
          uds run publish:zarf-package \
            --with registry_org="uds-army-demo" \
            --with registry_user_id="${{ secrets.REGISTRY_USER_ID }}" \
            --with registry_password="${{ secrets.REGISTRY_PASSWORD }}"

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "v${VERSION}" \
            --generate-notes \
            zarf-package-uds-lab-platform-amd64-${VERSION}.tar.zst
