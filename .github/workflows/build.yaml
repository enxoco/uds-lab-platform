name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  IMAGE: ghcr.io/enxoco/uds-lab-platform

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: defenseunicorns-udm/udm-common/.github/actions/uds-cli-setup@9aaad66b21c7637b5be3d6aafdb21c9e7ff1df2a # v0.10.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin
      - name: Lint
        run: uds run attest:lint
      - name: Security scan
        run: |
          uds run scan:security \
            --with gitleaks_scan_path="." \
            --with opengrep_scan_path="."
      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=dev
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and load image (amd64)
        if: github.event_name == 'push'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Save image tar for zarf
        if: github.event_name == 'push'
        run: docker save ${{ env.IMAGE }}:dev -o ./lab-server.tar
      - name: Tag and push to GHCR
        if: github.event_name == 'push'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | grep -v '^$' | while IFS= read -r tag; do
            docker tag ${{ env.IMAGE }}:dev "$tag"
            docker push "$tag"
          done
      - name: Build zarf package
        if: github.event_name == 'push'
        run: uds run build:zarf-package
      - name: Vouch
        if: github.event_name == 'push'
        run: |
          uds run vouch:package \
            --with attestations="lint-witness.json,gitleaks-witness.json,opengrep-witness.json,zarf-create-witness.json" \
            --with sarif_files="gitleaks.sarif.json,opengrep.sarif.json" \
            --with olm_cat="cat-api.uds-mil.us" \
            --with olm_org="uds-army-demo"
      - name: Publish zarf package
        if: github.event_name == 'push'
        run: |
          uds run publish:zarf-package \
            --with registry_org="uds-army-demo" \
            --with registry_user_id="${{ secrets.REGISTRY_USER_ID }}" \
            --with registry_password="${{ secrets.REGISTRY_PASSWORD }}"
